  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            tech: {
              bg: '#0f172a',      // Dark slate background
              panel: '#1e293b',   // Lighter panel
              border: '#334155',  // Border color
              accent: '#06b6d4',  // Cyan neon
              secondary: '#6366f1', // Indigo
              success: '#10b981', // Emerald
              danger: '#ef4444',  // Red
              warning: '#f59e0b', // Amber
            }
          },
          boxShadow: {
            'neon': '0 0 5px theme("colors.tech.accent"), 0 0 10px theme("colors.tech.accent")',
            'neon-red': '0 0 5px theme("colors.tech.danger"), 0 0 10px theme("colors.tech.danger")',
            'neon-green': '0 0 5px theme("colors.tech.success"), 0 0 10px theme("colors.tech.success")',
            'neon-purple': '0 0 5px theme("colors.tech.secondary"), 0 0 10px theme("colors.tech.secondary")',
          },

  </script>

  <style>
    /* Custom Scrollbar for Webkit */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a; 
    }
    ::-webkit-scrollbar-thumb {
      background: #334155; 
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #475569; 
    }

    /* Content Editable Placeholder */
    [contenteditable]:empty:before {
      content: attr(placeholder);
      color: #64748b;
      cursor: text;
    }

    /* Editor Specific Styles */
    .editor-content img {
      max-width: 100%;
      border-radius: 4px;
      border: 1px solid #334155;
      margin: 10px 0;
      transition: all 0.2s;
    }
    .editor-content img.resizable {
      box-shadow: 0 0 0 2px #06b6d4;
    }
    
    /* Elegant tech style for tables pasted */
    .editor-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 15px;
      border: 1px solid #334155;
    }
    .editor-content th {
      background-color: #1e293b;
      color: #06b6d4;
      font-weight: 600;
      padding: 8px 12px;
      border: 1px solid #334155;
      text-align: left;
    }
    .editor-content td {
      padding: 8px 12px;
      border: 1px solid #334155;
      color: #cbd5e1;
    }
    .editor-content tr:nth-child(even) {
      background-color: rgba(255, 255, 255, 0.02);
    }
    
    /* Animation classes */
    .fade-in {
      animation: fadeIn 0.3s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Glassmorphism utility */
    .glass-panel {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Transition utilities for collapsing panels */
    .panel-transition {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden; /* Important for hiding content during collapse */
    }
    
    .panel-closed-width {
      width: 0 !important;
      padding-left: 0 !important;
      padding-right: 0 !important;
      border-right: none !important;
      border-left: none !important;
      opacity: 0;
    }

    .panel-closed-height {
      height: 0 !important;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      border-top: none !important;
      border-bottom: none !important;
      opacity: 0;
    }

    /* AI Loading State */
    .ai-loading {
      position: relative;
      overflow: hidden;
    }
    .ai-loading::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.2), transparent);
      transform: translateX(-100%);
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }
  </style>
</head>

  <script>
    // --- State Management ---
    let notes = [];
    let currentNoteId = null; // null implies "New Note" mode

    // --- IndexedDB Configuration ---
    const DB_NAME = 'ZettelAIDB';
    const STORE_NAME = 'notes_store';

    // 初始化並開啟 IndexedDB
    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME);
                }
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    // 從 IndexedDB 讀取所有筆記
    async function loadFromStorage() {
        try {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.get('all_notes');
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        } catch (err) {
            console.error('讀取 IndexedDB 失敗', err);
            return null;
        }
    }

    // 將所有筆記儲存至 IndexedDB
    async function saveToStorage() {
        try {
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            // 直接儲存整個 Array 物件，無需 JSON.stringify
            store.put(notes, 'all_notes');
        } catch (err) {
            console.error('儲存至 IndexedDB 失敗', err);
            showToast('儲存資料庫失敗', 'error');
        }
    }

    // --- Gemini API Configuration ---
    const apiKey = ""; // API Key will be injected by the environment
    
    // --- DOM Elements ---
    const els = {
      list: document.getElementById('note-list'),
      title: document.getElementById('note-title'),
      content: document.getElementById('editor-content'),
      tagInput: document.getElementById('tag-input'),
      tagHistory: document.getElementById('tag-history'),
      activeTags: document.getElementById('active-tags'),
      linkInput: document.getElementById('link-input'),
      linkSuggestions: document.getElementById('link-suggestions'),
      linkedList: document.getElementById('linked-notes-list'),
      searchInput: document.getElementById('search-input'),
      tagFilter: document.getElementById('tag-filter'),
      btnDelete: document.getElementById('btn-delete'),
      btnSaveUpdate: document.getElementById('btn-save-update'),
      status: document.getElementById('save-status'),
      toastContainer: document.getElementById('toast-container'),
      sidebarLeft: document.getElementById('sidebar-left'),
      sidebarRight: document.getElementById('sidebar-right')
    };

    // --- Initialization ---
    window.onload = async function() {
      // 嘗試從 IndexedDB 載入資料
      const stored = await loadFromStorage();
      
      if (stored && Array.isArray(stored) && stored.length > 0) {
        notes = stored;
      } else {
        // 退回機制：檢查 localStorage 中是否有舊資料並進行遷移
        const oldLocal = localStorage.getItem('zettelkasten_notes');
        if (oldLocal) {
            try {
                notes = JSON.parse(oldLocal);
                await saveToStorage(); // 遷移到 IndexedDB
                console.log('已從 localStorage 成功遷移資料至 IndexedDB');
            } catch (err) {
                console.error('遷移資料失敗', err);
            }
        } else {
            // Initial onboarding note
            notes = [{
              id: '1',
              title: '歡迎使用 ZETTEL_AI',
              content: '<b>開始你的數位大腦旅程。</b><br><br>這是一個結合科技風格、卡片盒筆記法與 Gemini AI 的系統。<br><br><b>✨ 核心功能：</b>在右側面板，你可以找到多個 AI 工具：<br>1. <b>智能標記</b>：自動分析內容並加上標籤。<br>2. <b>重點摘要</b>：幫你總結長篇大論。<br>3. <b>智能關聯</b>：自動分析所有筆記，建立知識網絡。<br>4. <b>智慧網頁剪藏</b>：輸入任何網址，AI 自動為您完整抓取網頁內容、分類標籤，並跟系統內現有卡片建立連結！<br><br>點擊上方工具列的按鈕可以開合左右面板，讓寫作更專注。<br><br><i>🚀 系統已升級至 IndexedDB，突破瀏覽器儲存限制，現在您可以盡情插入大量圖片了！</i>',
              tags: ['System', 'Help', 'AI'],
              linkedNotes: []
            }];
        }
      }
      renderNoteList();
      updateTagHistory();
      renderLinkSuggestions();
      createNewNote(); // Start in create mode
      
      // 註冊安全貼上監聽器
      els.content.addEventListener('paste', handlePaste);
    };

    // --- Elegant Smart Paste Handler ---
    function handlePaste(e) {
        e.preventDefault();
        
        // 取得剪貼簿資料
        const text = e.clipboardData.getData('text/plain');
        const html = e.clipboardData.getData('text/html');
        
        if (html) {
            // 安全清洗並取得 HTML 內容
            const cleanedHtml = cleanPastedHTML(html);
            document.execCommand('insertHTML', false, cleanedHtml);
            
            // 延遲重新綁定新加入圖片的縮放事件
            setTimeout(() => {
                document.querySelectorAll('#editor-content img').forEach(makeImageResizable);
            }, 100);
            showToast('已智慧過濾網頁格式與廣告樣式', 'success');
        } else if (text) {
            // 沒有 HTML 時，僅插入乾淨的純文字
            document.execCommand('insertText', false, text);
        }
    }

    // 手動安全過濾器 (Unwrap 機制，取代 DOMPurify 防禦廣告與垃圾 HTML)
    function cleanPastedHTML(htmlString) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlString, 'text/html');
        
        // 允許保留的安全語意與排版標籤 (排除所有 div, span, section 及其自訂外觀)
        const allowedTags = [
            'P', 'BR', 'B', 'STRONG', 'I', 'EM', 'U', 
            'H1', 'H2', 'H3', 'H4', 'H5', 'H6', 
            'UL', 'OL', 'LI', 'BLOCKQUOTE',
            'TABLE', 'THEAD', 'TBODY', 'TR', 'TH', 'TD', 
            'IMG', 'A'
        ];
        
        function sanitizeNode(node) {
            // 文字節點：直接原樣複製
            if (node.nodeType === Node.TEXT_NODE) {
                return node.cloneNode(true);
            }
            
            // 元素節點：檢查白名單
            if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toUpperCase();
                
                if (allowedTags.includes(tagName)) {
                    const newNode = doc.createElement(tagName);
                    
                    // 針對特定的安全標籤處理屬性，移除 class 與 style 等垃圾屬性
                    if (tagName === 'IMG') {
                        const src = node.getAttribute('src');
                        if (src) {
                            newNode.setAttribute('src', src);
                            newNode.className = 'resizable';
                            newNode.style.width = '200px';
                            newNode.style.height = 'auto';
                        }
                    } else if (tagName === 'A') {
                        const href = node.getAttribute('href');
                        if (href && (href.startsWith('http://') || href.startsWith('https://') || href.startsWith('#'))) {
                            newNode.setAttribute('href', href);
                            newNode.setAttribute('target', '_blank');
                            newNode.className = 'text-tech-accent underline hover:text-white transition';
                        }
                    }
                    
                    // 遞迴複製處理子節點
                    node.childNodes.forEach(child => {
                        const sanitizedChild = sanitizeNode(child);
                        if (sanitizedChild) {
                            newNode.appendChild(sanitizedChild);
                        }
                    });
                    
                    return newNode;
                } else {
                    // 如果是不合法的標籤 (如 div, span, section)，進行 Unwrap 展開
                    // 只保留其底下的安全字元與安全格式
                    const fragment = doc.createDocumentFragment();
                    node.childNodes.forEach(child => {
                        const sanitizedChild = sanitizeNode(child);
                        if (sanitizedChild) {
                            fragment.appendChild(sanitizedChild);
                        }
                    });
                    return fragment;
                }
            }
            return null;
        }
        
        // 處理整個文件 body
        const rootFragment = doc.createDocumentFragment();
        doc.body.childNodes.forEach(child => {
            const sanitized = sanitizeNode(child);
            if (sanitized) {
                rootFragment.appendChild(sanitized);
            }
        });
        
        const tempDiv = doc.createElement('div');
        tempDiv.appendChild(rootFragment);
        return tempDiv.innerHTML;
    }

    // --- Gemini AI Functions ---

    async function callGemini(prompt, systemInstruction = "", useSearch = false) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const payload = {
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: {
                maxOutputTokens: 2000,
                temperature: 0.4
            }
        };
        if (systemInstruction) {
            payload.systemInstruction = { parts: [{ text: systemInstruction }] };
        }
        if (useSearch) {
            payload.tools = [{ "google_search": {} }];
        }

        const delays = [1000, 2000, 4000, 8000, 16000];
        for (let i = 0; i <= 5; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
            } catch (e) {
                 if (i === 5) throw e;
                 await new Promise(r => setTimeout(r, delays[i]));
            }
        }
    }

1. 適合的筆記標題 (title)

4. 3 到 5 個適合這篇內容的關鍵字標籤 (tags)

請務必使用繁體中文（台灣繁體）回答。`;

            const systemInstruction = "你是一個專業的知識管理與網頁剪藏助手。請精準閱讀網頁核心內容，並輸出乾淨的結構化資料。不要輸出任何 Markdown 標記，直接輸出符合 Schema 的 JSON。";

            // 使用 Structured JSON
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] },
                tools: [{ "google_search": {} }],
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            title: { type: "STRING" },
                            content: { type: "STRING" },
                            summary: { type: "STRING" },
                            tags: { type: "ARRAY", items: { type: "STRING" } },
                            relatedKeywords: { type: "ARRAY", items: { type: "STRING" } }
                        },
                        required: ["title", "content", "summary", "tags", "relatedKeywords"]
                    }
                }
            };

            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            let resultText = "";
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i <= 5; i++) {
                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();
                    resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                    break;
                } catch (e) {
                     if (i === 5) throw e;
                     await new Promise(r => setTimeout(r, delays[i]));
                }
            }

            if (!resultText) {
                throw new Error("Gemini 無回傳內容");
            }

            const parsed = JSON.parse(resultText);
            
            // 建立新資料卡 ID
            const newId = genId();
            
            // 格式化內文：將 AI 完整剪藏正文放最前面，後面放轉換後的部分
            const summaryHTML = `<blockquote style="border-left: 3px solid #f59e0b; padding-left: 10px; color: #cbd5e1; margin: 10px 0; background: rgba(245, 158, 11, 0.1); padding: 8px; border-radius: 4px;"><strong>✨ AI 完整剪藏內容：</strong>${parsed.summary}</blockquote><p><br></p>`;
            const finalContent = summaryHTML + parsed.content;

            // 尋找現有相關筆記建立雙向連結

                // 如果現有筆記的標題包含 AI 建議的任何關鍵字，或者目前的標題包含現有筆記關鍵字
                const matchKeyword = parsed.relatedKeywords.some(kw => 
                    note.title.toLowerCase().includes(kw.toLowerCase()) ||

                );
                if (matchKeyword && note.id !== newId) {
                    suggestedLinks.push(note.id);
                    // 建立雙向連結
                    if (!note.linkedNotes) note.linkedNotes = [];
                    if (!note.linkedNotes.includes(newId)) {
                        note.linkedNotes.push(newId);
                    }
                }
            });

            const newNote = {
                id: newId,
                title: parsed.title,
                content: finalContent,
                tags: parsed.tags || [],
                linkedNotes: suggestedLinks
            };

            notes.push(newNote);
            await saveToStorage();
            
            // 重新渲染與讀取新剪藏的筆記
            renderNoteList();
            updateTagHistory();
            renderLinkSuggestions();
            loadNote(newId);

            // 清空網址輸入框
            urlInput.value = '';
            showToast(`✨ 成功剪藏《${parsed.title}》！已自動填入完整內容、生成標籤並建立關聯連結！`, "success");

        } catch (error) {
            console.error(error);
            showToast("智慧剪藏失敗，請確認網路連線或 API Key 設定", "error");
        } finally {
            setLoading(btn, false);
        }

    async function aiAutoLink() {
        const text = els.content.innerText.trim();
        const title = els.title.value.trim();

        if (text.length < 10 && title.length < 2) {
            showToast("內容太少，無法分析關聯", "error");
            return;
        }

        const availableNotes = notes.filter(n => n.id !== currentNoteId);
        if (availableNotes.length === 0) {
            showToast("系統中沒有其他筆記可供關聯", "info");
            return;
        }

        const btn = document.getElementById('btn-ai-link');
        setLoading(btn, true);

        try {
            // 將可用筆記組合成 "ID::標題" 的清單格式供 AI 分析
            const availableNotesText = availableNotes.map(n => `${n.id}::${n.title}`).join('\n');
            const prompt = `你是一個知識網狀關聯助手。請閱讀[目前筆記]，並從[可用筆記清單]中，挑選出 1 到 5 個最相關的筆記。\n請「只」回傳筆記的 ID，並用半形逗號分隔（例如：id1,id2），不要包含任何其他文字或符號。\n\n[目前筆記標題]\n${title}\n\n[目前筆記內容]\n${text}\n\n[可用筆記清單 (ID::標題)]\n${availableNotesText}`;
            
            const result = await callGemini(prompt);
            
            // 清理可能出現的 markdown 格式或換行符號
            const cleanedResult = result.replace(/```/g, '').replace(/`/g, '').replace(/\n/g, '');
            const suggestedIds = cleanedResult.split(',').map(id => id.trim()).filter(id => id);
            
            // 取得當前 UI 上已經存在的關聯
            const existingLinks = Array.from(els.linkedList.querySelectorAll('.link-card')).map(d => d.dataset.id);
            const newLinks = [...existingLinks];
            let addedCount = 0;

            suggestedIds.forEach(id => {
                // 確認 ID 真的存在於其他筆記中，且尚未被加入
                if (availableNotes.some(n => n.id === id) && !newLinks.includes(id)) {
                    newLinks.push(id);
                    addedCount++;
                }
            });

            if (addedCount > 0) {
                renderLinkedUI(newLinks); // 更新 UI
                showToast(`已自動關聯 ${addedCount} 則相關筆記`, "success");
            } else {
                showToast("未發現高度相關的其他筆記", "info");
            }

        } catch (error) {
            console.error(error);
            showToast("AI 關聯分析失敗，請稍後再試", "error");
        } finally {
            setLoading(btn, false);
        }
    }

    // --- Loading State Manager ---
    function setLoading(btn, isLoading) {
        if (isLoading) {
            btn.classList.add('ai-loading', 'pointer-events-none');
            const icon = btn.querySelector('i');
            icon.dataset.originalClass = icon.className;
            icon.className = 'fa-solid fa-circle-notch fa-spin w-6 text-yellow-400';
        } else {
            btn.classList.remove('ai-loading', 'pointer-events-none');
            const icon = btn.querySelector('i');
            if (icon.dataset.originalClass) {
                icon.className = icon.dataset.originalClass;
            }
        }
    }

    // --- Core Operations ---

    function genId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2);
    }

    function createNewNote() {
      currentNoteId = null;
      els.title.value = '';
      els.content.innerHTML = '';
      els.btnDelete.classList.add('hidden');
      els.btnSaveUpdate.innerHTML = '<i class="fa-solid fa-plus mr-1"></i> 建立新筆記';
      els.status.textContent = '新資料卡模式';
      
      renderTagsUI([]);
      renderLinkedUI([]);
      
      // Highlight selection in sidebar (remove all)
      document.querySelectorAll('.note-item').forEach(el => el.classList.remove('border-tech-accent', 'bg-slate-800'));
      els.title.focus();
    }

    function loadNote(id) {
      const note = notes.find(n => n.id === id);
      if (!note) return;

      currentNoteId = note.id;
      els.title.value = note.title;
      els.content.innerHTML = note.content;
      
      // Setup UI for edit mode
      els.btnDelete.classList.remove('hidden');
      els.btnSaveUpdate.innerHTML = '<i class="fa-regular fa-floppy-disk mr-1"></i> 更新筆記';
      els.status.textContent = `ID: ${note.id.substring(0,6)}...`;

      renderTagsUI(note.tags || []);
      renderLinkedUI(note.linkedNotes || []);
      
      // Highlight sidebar
      document.querySelectorAll('.note-item').forEach(el => {
        el.classList.remove('border-tech-accent', 'bg-slate-800');
        if(el.dataset.id === id) el.classList.add('border-tech-accent', 'bg-slate-800');
      });

      // Re-attach image listeners
      document.querySelectorAll('#editor-content img').forEach(makeImageResizable);
    }

    function updateCurrentNote() {
      const title = els.title.value.trim();
      const content = els.content.innerHTML;

      if (!title) {
        showToast('錯誤：標題不能為空', 'error');
        return;
      }

      // Get current UI state for tags and links
      const currentTags = Array.from(els.activeTags.querySelectorAll('.tag-chip span')).map(s => s.textContent);
      const currentLinks = Array.from(els.linkedList.querySelectorAll('.link-card')).map(d => d.dataset.id);

      if (currentNoteId) {
        // Update existing
        const index = notes.findIndex(n => n.id === currentNoteId);
        if (index !== -1) {
          notes[index] = { ...notes[index], title, content, tags: currentTags, linkedNotes: currentLinks };
          showToast('資料已更新', 'success');
        }
      } else {
        // Create new
        const newId = genId();
        const newNote = {
          id: newId,
          title,
          content,
          tags: currentTags,
          linkedNotes: currentLinks
        };
        notes.push(newNote);
        currentNoteId = newId;
        
        // Handle bidirectional linking
        currentLinks.forEach(targetId => {
          const target = notes.find(n => n.id === targetId);
          if (target && !target.linkedNotes.includes(newId)) {
            target.linkedNotes.push(newId);
          }
        });
        
        showToast('新資料卡已建立', 'success');
        els.btnDelete.classList.remove('hidden');
        els.btnSaveUpdate.innerHTML = '<i class="fa-regular fa-floppy-disk mr-1"></i> 更新筆記';
      }

      saveToStorage();
      renderNoteList();
      updateTagHistory();
      renderLinkSuggestions();
    }

    function deleteCurrentNote() {
      if (!currentNoteId) return;
      if (!confirm('確認刪除此資料卡？此操作無法復原。')) return;

      // Remove backlinks
      notes.forEach(n => {
        if (n.linkedNotes) {
          n.linkedNotes = n.linkedNotes.filter(id => id !== currentNoteId);
        }
      });

      notes = notes.filter(n => n.id !== currentNoteId);
      saveToStorage();
      renderNoteList();
      renderLinkSuggestions();
      createNewNote();
      showToast('資料已刪除', 'info');
    }

        const isRowLayout = window.innerWidth >= 768 || window.matchMedia("(orientation: landscape)").matches;

                els.sidebarLeft.classList.toggle('panel-closed-width');

            }

        }

    function renderLinkedUI(linkedIds) {

            <button onclick="removeLink(this)" class="text-slate-500 hover:text-red-400 ml-2 px-1"><i class="fa-solid fa-times"></i></button>
          `;
          els.linkedList.appendChild(card);
        }
      });
    }

    function renderLinkSuggestions() {
      els.linkSuggestions.innerHTML = '';
      notes.forEach(note => {
        const opt = document.createElement('option');
        opt.value = note.title;
        opt.dataset.id = note.id; // Datalist doesn't standardly support hidden IDs, handled in logic
        els.linkSuggestions.appendChild(opt);
      });
    }

    function updateTagHistory() {
      // Collect unique tags
      const allTags = new Set();
      notes.forEach(n => (n.tags || []).forEach(t => allTags.add(t)));
      
      // Update Filter
      const currentFilter = els.tagFilter.value;
      els.tagFilter.innerHTML = '<option value="">所有標籤</option>';
      allTags.forEach(tag => {
        const opt = document.createElement('option');
        opt.value = tag;
        opt.textContent = tag;
        els.tagFilter.appendChild(opt);
      });
      els.tagFilter.value = currentFilter;

      // Update Editor History Select
      els.tagHistory.innerHTML = '<option value="">+ 從歷史標籤選擇</option>';
      allTags.forEach(tag => {
        const opt = document.createElement('option');
        opt.value = tag;
        opt.textContent = tag;
        els.tagHistory.appendChild(opt);
      });
    }

    // --- Event Handlers & Helpers ---

    // Search Filter
    els.searchInput.addEventListener('input', renderNoteList);
    
    function filterNotes() {
      renderNoteList();
    }

    // Tag Management
    function addTag() {
      const tag = els.tagInput.value.trim();
      if (!tag) return;
      
      // Check duplicate in current UI
      const currentTags = Array.from(els.activeTags.querySelectorAll('.tag-chip span')).map(s => s.textContent);
      if (currentTags.includes(tag)) return;

      addTagToUI(tag);
      els.tagInput.value = '';
    }

    function addTagFromHistory(select) {
      const tag = select.value;
      if (!tag) return;
      
      els.tagInput.value = tag;
      addTag();
      select.value = '';
    }

    function removeTag(btn) {
      btn.parentElement.remove();
    }

    // Link Management
    function addLinkedNote() {
      const title = els.linkInput.value;
      if (!title) return;

      const targetNote = notes.find(n => n.title === title);
      
      if (!targetNote) {
        showToast('找不到該標題的筆記', 'error');
        return;
      }
      
      if (targetNote.id === currentNoteId) {
        showToast('無法連結自己', 'error');
        return;
      }

      // Check duplicate in UI
      const existing = Array.from(els.linkedList.querySelectorAll('.link-card')).map(d => d.dataset.id);
      if (existing.includes(targetNote.id)) {
        showToast('已連結此筆記', 'info');
        return;
      }

      renderLinkedUI([...existing, targetNote.id]);
      els.linkInput.value = '';
    }

    function removeLink(btn) {
      btn.parentElement.remove();
    }

    // Editor Formatting
    function formatText(command) {
      document.execCommand(command, false, null);
      els.content.focus();
    }

    function changeFontSize(val) {
      document.execCommand('fontSize', false, val);
      els.content.focus();
    }

    // 插入圖片 (本機上傳)
    function insertImage(input) {
      const file = input.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        els.content.focus();
        document.execCommand('insertImage', false, e.target.result);
        
        setTimeout(() => {
          document.querySelectorAll('#editor-content img').forEach(makeImageResizable);
        }, 100);
      };
      reader.readAsDataURL(file);
      input.value = '';
    }

    function makeImageResizable(img) {
        if(img.dataset.resizable) return;
        img.dataset.resizable = "true";
        
        img.addEventListener('click', function(e) {
            e.stopPropagation();
            document.querySelectorAll('img').forEach(i => i.classList.remove('resizable'));
            img.classList.add('resizable');
        });
    }

    document.addEventListener('click', function(e) {
        if (!e.target.closest('img')) {
            document.querySelectorAll('img').forEach(i => i.classList.remove('resizable'));
        }
    });

    // Import / Export
    function saveNotes() {
      const dataStr = JSON.stringify(notes, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `zettelkasten_backup_${new Date().toISOString().split('T')[0]}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('備份檔案已下載', 'success');
    }

    function importNotes() {
        const fileInput = document.getElementById('import-notes');
        const file = fileInput.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (!Array.isArray(imported)) throw new Error("Format");
                
                const existingIds = new Set(notes.map(n => n.id));
                let count = 0;
                
                imported.forEach(n => {
                    if(!n.id) n.id = genId();
                    if(!existingIds.has(n.id)) {
                        notes.push(n);
                        existingIds.add(n.id);
                        count++;
                    }
                });

                saveToStorage();
                renderNoteList();
                updateTagHistory();
                renderLinkSuggestions();
                showToast(`成功導入 ${count} 則筆記`, 'success');
            } catch (err) {
                showToast('檔案格式錯誤', 'error');
            }
            fileInput.value = '';
        };
        reader.readAsText(file);
    }

    // Toast Notification
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      const colors = {
        'success': 'border-tech-success text-tech-success bg-slate-900',
        'error': 'border-tech-danger text-tech-danger bg-slate-900',
        'info': 'border-tech-accent text-tech-accent bg-slate-900'
      };
      
      toast.className = `p-3 rounded border shadow-lg flex items-center gap-2 min-w-[200px] animate-fade-in ${colors[type]}`;
      toast.innerHTML = `
        <i class="fa-solid ${type === 'success' ? 'fa-check' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i>
        <span class="text-sm font-mono">${message}</span>
      `;
      
      els.toastContainer.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-10px)';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
    

  </script>
</body>
</html>
