<!DOCTYPE html>

<head>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: JetBrains Mono (Code/Tech feel) & Inter -->

  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            tech: {
              bg: '#0f172a',      // Dark slate background
              panel: '#1e293b',   // Lighter panel
              border: '#334155',  // Border color
              accent: '#06b6d4',  // Cyan neon
              secondary: '#6366f1', // Indigo
              success: '#10b981', // Emerald
              danger: '#ef4444',  // Red
              warning: '#f59e0b', // Amber
            }
          },
          boxShadow: {
            'neon': '0 0 5px theme("colors.tech.accent"), 0 0 10px theme("colors.tech.accent")',
            'neon-red': '0 0 5px theme("colors.tech.danger"), 0 0 10px theme("colors.tech.danger")',
            'neon-green': '0 0 5px theme("colors.tech.success"), 0 0 10px theme("colors.tech.success")',
            'neon-purple': '0 0 5px theme("colors.tech.secondary"), 0 0 10px theme("colors.tech.secondary")',
          },
          animation: {
            'spin-slow': 'spin 3s linear infinite',
            'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>

  <style>
    /* Custom Scrollbar for Webkit */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }

    /* Content Editable Placeholder */
    [contenteditable]:empty:before { content: attr(placeholder); color: #64748b; cursor: text; }

    /* Editor Specific Styles */
    .editor-content img { max-width: 100%; border-radius: 4px; border: 1px solid #334155; margin: 10px 0; transition: all 0.2s; cursor: pointer; }
    .editor-content img.resizable { box-shadow: 0 0 0 2px #06b6d4; }
    
    .editor-content table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 15px; border: 1px solid #334155; }
    .editor-content th { background-color: #1e293b; color: #06b6d4; font-weight: 600; padding: 8px 12px; border: 1px solid #334155; text-align: left; }
    .editor-content td { padding: 8px 12px; border: 1px solid #334155; color: #cbd5e1; }
    .editor-content tr:nth-child(even) { background-color: rgba(255, 255, 255, 0.02); }
    
    /* Animation classes */
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Glassmorphism utility */
    .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }

    /* Transition utilities */
    .panel-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; }
    .panel-closed-width { width: 0 !important; padding-left: 0 !important; padding-right: 0 !important; border: none !important; opacity: 0; }
    .panel-closed-height { height: 0 !important; padding-top: 0 !important; padding-bottom: 0 !important; border: none !important; opacity: 0; }

    /* Drawer specific transition */
    .drawer-open { transform: translateX(0); }
    .drawer-closed { transform: translateX(100%); }

    /* AI Loading State */
    .ai-loading { position: relative; overflow: hidden; }
    .ai-loading::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.2), transparent); transform: translateX(-100%); animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 100% { transform: translateX(100%); } }
  </style>
</head>

  <script>
    // --- State Management ---
    let notes = [];
    let currentNoteId = null; 
    let activeFilters = {}; // Faceted Search 狀態
    let expandedTagPaths = new Set(["init_done"]); // 標籤樹展開記憶
    let activeFloatingPanel = null; // 浮動面板狀態控制 ('tag', 'filter', 'ai', null)

    // --- IndexedDB Configuration ---
    const DB_NAME = 'ZettelAIDB';
    const STORE_NAME = 'notes_store';

    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function loadFromStorage() {
        try {
            const db = await initDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.get('all_notes');
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        } catch (err) {
            console.error('讀取 IndexedDB 失敗', err);
            return null;
        }
    }

    async function saveToStorage() {
        try {
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.put(notes, 'all_notes');
        } catch (err) {
            showToast('儲存資料庫失敗', 'error');
        }
    }

    // --- Gemini API Configuration ---
    const apiKey = ""; // API Key injected automatically by environment
    
    // --- DOM Elements ---
    const els = {
      list: document.getElementById('note-list'),
      title: document.getElementById('note-title'),
      content: document.getElementById('editor-content'),
      tagInput: document.getElementById('tag-input'),
      tagHistory: document.getElementById('tag-history'),
      activeTags: document.getElementById('active-tags'),
      linkInput: document.getElementById('link-input'),
      linkSuggestions: document.getElementById('link-suggestions'),
      linkedList: document.getElementById('linked-notes-list'),
      searchInput: document.getElementById('search-input'),
      btnDelete: document.getElementById('btn-delete'),
      btnSaveUpdate: document.getElementById('btn-save-update'),
      status: document.getElementById('save-status'),
      toastContainer: document.getElementById('toast-container'),
      sidebarLeft: document.getElementById('sidebar-left'),
      sidebarRight: document.getElementById('sidebar-right'),
      
      // Floating Panel Elements
      tagExplorer: document.getElementById('tag-explorer'), 
      tagTreeSearch: document.getElementById('tag-tree-search'),
      filtersList: document.getElementById('active-filters-list'),
      noFiltersMsg: document.getElementById('no-filters-msg'),
      filterBadge: document.getElementById('filter-badge')
    };

    // --- Toast Notification ---
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      const colors = {
        'success': 'bg-emerald-600 border-emerald-500',
        'error': 'bg-red-600 border-red-500',
        'info': 'bg-blue-600 border-blue-500'
      };
      const colorClass = colors[type] || colors['info'];
      
      toast.className = `${colorClass} text-white px-4 py-3 rounded shadow-lg flex items-center gap-2 min-w-[200px] animate-fade-in border z-[9999]`;
      toast.innerHTML = `
        <i class="fa-solid ${type === 'success' ? 'fa-check' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i>
        <span class="text-sm font-mono">${message}</span>
      `;
      
      els.toastContainer.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-10px)';
        toast.style.transition = 'all 0.3s';

    function handlePaste(e) {
        e.preventDefault();
        const text = e.clipboardData.getData('text/plain');
        const html = e.clipboardData.getData('text/html');
        if (html) {
            const cleanedHtml = cleanPastedHTML(html);
            document.execCommand('insertHTML', false, cleanedHtml);
            setTimeout(() => document.querySelectorAll('#editor-content img').forEach(makeImageResizable), 100);
            showToast('已智慧過濾網頁格式與廣告樣式', 'success');
        } else if (text) {
            document.execCommand('insertText', false, text);
        }
    }

    function cleanPastedHTML(htmlString) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlString, 'text/html');
        const allowedTags = ['P', 'BR', 'B', 'STRONG', 'I', 'EM', 'U', 'H1', 'H2', 'H3', 'H4', 'H5', 'H6', 'UL', 'OL', 'LI', 'BLOCKQUOTE', 'TABLE', 'THEAD', 'TBODY', 'TR', 'TH', 'TD', 'IMG', 'A'];
        
        function sanitizeNode(node) {
            if (node.nodeType === Node.TEXT_NODE) return node.cloneNode(true);
            if (node.nodeType === Node.ELEMENT_NODE) {
                const tagName = node.tagName.toUpperCase();
                if (allowedTags.includes(tagName)) {
                    const newNode = doc.createElement(tagName);
                    if (tagName === 'IMG') {
                        const src = node.getAttribute('src');
                        if (src) { newNode.setAttribute('src', src); newNode.className = 'resizable'; newNode.style.width = '200px'; newNode.style.height = 'auto'; }
                    } else if (tagName === 'A') {
                        const href = node.getAttribute('href');
                        if (href && (href.startsWith('http') || href.startsWith('#'))) { newNode.setAttribute('href', href); newNode.setAttribute('target', '_blank'); newNode.className = 'text-tech-accent underline hover:text-white transition'; }
                    }
                    node.childNodes.forEach(child => { const sanitizedChild = sanitizeNode(child); if (sanitizedChild) newNode.appendChild(sanitizedChild); });
                    return newNode;
                } else {
                    const fragment = doc.createDocumentFragment();
                    node.childNodes.forEach(child => { const sanitizedChild = sanitizeNode(child); if (sanitizedChild) fragment.appendChild(sanitizedChild); });
                    return fragment;
                }
            }
            return null;
        }
        const rootFragment = doc.createDocumentFragment();
        doc.body.childNodes.forEach(child => { const sanitized = sanitizeNode(child); if (sanitized) rootFragment.appendChild(sanitized); });
        const tempDiv = doc.createElement('div'); tempDiv.appendChild(rootFragment);
        return tempDiv.innerHTML;
    }

    // --- Gemini AI Functions ---
    async function callGemini(prompt, systemInstruction = "", useSearch = false) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const payload = { contents: [{ parts: [{ text: prompt }] }], generationConfig: { maxOutputTokens: 2000, temperature: 0.4 } };
        if (systemInstruction) payload.systemInstruction = { parts: [{ text: systemInstruction }] };
        if (useSearch) payload.tools = [{ "google_search": {} }];

        for (let i = 0; i <= 5; i++) {
            try {
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
            } catch (e) {
                 if (i === 5) throw e;
                 await new Promise(r => setTimeout(r, [1000, 2000, 4000, 8000, 16000][i]));
            }
        }
    }

    // --- Filters & Tree Core ---
    function applyFacetedFilters(notesList, filters) {
        const filterTypes = Object.keys(filters).filter(type => filters[type].length > 0);
        if (filterTypes.length === 0) return notesList;
        return notesList.filter(note => {
            return filterTypes.every(type => {
                const allowedValues = filters[type];
                return (note.tags || []).some(tag => {
                    const parts = tag.split('/');
                    if (parts[0] !== type) return false;
                    const valuePath = parts.slice(1).join('/');
                    return allowedValues.some(val => valuePath === val || valuePath.startsWith(val + '/'));
                });
            });
        });
    }

        const chip = document.createElement('div');
        chip.className = 'tag-chip bg-tech-accent/20 border border-tech-accent/50 text-tech-accent px-2 py-1 rounded text-xs flex items-center gap-2 animate-fade-in';
        chip.innerHTML = `<span>${tag}</span><button onclick="removeTag(this)" class="hover:text-white"><i class="fa-solid fa-times"></i></button>`;
        els.activeTags.appendChild(chip);
    }

    function renderLinkedUI(linkedIds) {
      els.linkedList.innerHTML = '';
      linkedIds.forEach(id => {
        const note = notes.find(n => n.id === id);
        if (note) {
          const card = document.createElement('div');
          card.className = 'link-card bg-slate-800 border border-slate-700 p-2 rounded flex justify-between items-center group hover:border-tech-secondary transition cursor-pointer';
          card.dataset.id = id;
          card.innerHTML = `
            <div onclick="loadNote('${id}')" class="flex-1 overflow-hidden"><div class="text-sm font-bold text-slate-300 group-hover:text-tech-secondary truncate"><i class="fa-solid fa-link text-[10px] mr-1"></i> ${note.title}</div></div>
            <button onclick="removeLink(this)" class="text-slate-500 hover:text-red-400 ml-2 px-1"><i class="fa-solid fa-times"></i></button>
          `;
          els.linkedList.appendChild(card);
        }
      });
    }

    function renderLinkSuggestions() {
      els.linkSuggestions.innerHTML = '';
      notes.forEach(note => {
        const opt = document.createElement('option'); opt.value = note.title; opt.dataset.id = note.id;
        els.linkSuggestions.appendChild(opt);
      });
    }

    function updateTagHistory() {
      const allTags = new Set();
      notes.forEach(n => (n.tags || []).forEach(t => allTags.add(t)));
      els.tagHistory.innerHTML = '<option value="">+ 從歷史標籤選擇</option>';
      allTags.forEach(tag => {
        const opt = document.createElement('option'); opt.value = tag; opt.textContent = tag;
        els.tagHistory.appendChild(opt);
      });
    }

    els.searchInput.addEventListener('input', renderNoteList);

    function addTag() {
      const tag = els.tagInput.value.trim();
      if (!tag) return;
      const currentTags = Array.from(els.activeTags.querySelectorAll('.tag-chip span')).map(s => s.textContent);
      if (currentTags.includes(tag)) return;
      addTagToUI(tag); els.tagInput.value = '';
    }
    function addTagFromHistory(select) {
      if (!select.value) return;
      els.tagInput.value = select.value; addTag(); select.value = '';
    }
    function removeTag(btn) { btn.parentElement.remove(); }

    function addLinkedNote() {
      const title = els.linkInput.value; if (!title) return;
      const targetNote = notes.find(n => n.title === title);
      if (!targetNote) return showToast('找不到該標題的筆記', 'error');
      if (targetNote.id === currentNoteId) return showToast('無法連結自己', 'error');
      const existing = Array.from(els.linkedList.querySelectorAll('.link-card')).map(d => d.dataset.id);
      if (existing.includes(targetNote.id)) return showToast('已連結', 'info');
      renderLinkedUI([...existing, targetNote.id]); els.linkInput.value = '';
    }
    function removeLink(btn) { btn.parentElement.remove(); }

    function formatText(cmd) { document.execCommand(cmd, false, null); els.content.focus(); }
    function changeFontSize(val) { document.execCommand('fontSize', false, val); els.content.focus(); }
    
    function insertImage(input) {
      const file = input.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) { 
        els.content.focus(); 
        document.execCommand('insertImage', false, e.target.result); 
        setTimeout(() => document.querySelectorAll('.editor-content img').forEach(makeImageResizable), 100); 
      };
      reader.readAsDataURL(file); input.value = '';
    }

    function makeImageResizable(img) {
        if(img.dataset.resizable) return;
        img.dataset.resizable = "true";
        img.addEventListener('click', function(e) {
            e.stopPropagation();
            document.querySelectorAll('.editor-content img').forEach(i => i.classList.remove('resizable'));
            img.classList.add('resizable');
        });
    }

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.editor-content img')) {
            document.querySelectorAll('.editor-content img').forEach(i => i.classList.remove('resizable'));
        }
    });

    function saveNotes() {
      if (notes.length === 0) return showToast('目前沒有任何筆記', 'error');
      const blob = new Blob([JSON.stringify(notes, null, 2)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `zettelkasten_backup_${new Date().toISOString().split('T')[0]}.json`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href); showToast('已下載', 'success');
    }

    function importNotes() {
        const file = document.getElementById('import-notes').files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (!Array.isArray(imported)) throw new Error("Format");
                const existingIds = new Set(notes.map(n => n.id));
                let count = 0;
                imported.forEach(n => { if(!n.id) n.id = genId(); if(!existingIds.has(n.id)) { notes.push(n); existingIds.add(n.id); count++; } });
                await saveToStorage(); renderNoteList(); updateTagHistory(); renderLinkSuggestions(); updateTagTree();
                showToast(`導入 ${count} 則筆記`, 'success');
            } catch (err) { showToast('格式錯誤', 'error'); }
            document.getElementById('import-notes').value = '';
        };
        reader.readAsText(file);
    }

    // --- Tag Explorer & Filters Core ---
    function buildTagTree(notesList) {
        const tree = {};
        notesList.forEach(note => {
            const processedPaths = new Set();
            (note.tags || []).forEach(tag => {
                const parts = tag.split('/'); if (parts.length < 2) return;
                const type = parts[0]; const valuePath = parts.slice(1);
                let currentPath = type; processedPaths.add(currentPath);
                valuePath.forEach(val => { currentPath += '/' + val; processedPaths.add(currentPath); });
            });
            processedPaths.forEach(path => {
                const parts = path.split('/'); const type = parts[0]; const values = parts.slice(1);
                if (!tree[type]) tree[type] = { count: 0, children: {} };
                if (values.length === 0) tree[type].count++;
                else {
                    let currentLevel = tree[type].children;
                    values.forEach((val, idx) => {
                        if (!currentLevel[val]) currentLevel[val] = { count: 0, children: {} };
                        if (idx === values.length - 1) currentLevel[val].count++;
                        currentLevel = currentLevel[val].children;
                    });
                }
            });
        });
        return tree;
    }

    function updateTagTree() {
        const searchText = els.tagTreeSearch.value.trim().toLowerCase();
        const tree = buildTagTree(notes);
        els.tagExplorer.innerHTML = '';
        const hasMatch = renderTagExplorer(tree, els.tagExplorer, [], searchText);
        if (!hasMatch && searchText) els.tagExplorer.innerHTML = '<div class="text-xs text-slate-500 text-center py-2">無符合標籤</div>';
        renderActiveFiltersPanel(); // 更新 Filter 面板
    }

    function renderTagExplorer(tree, parentEl, pathParts = [], filterText = "") {
        const keys = Object.keys(tree).sort(); let hasAnyMatch = false;
        keys.forEach(key => {
            const node = tree[key]; const currentParts = [...pathParts, key]; const currentPath = currentParts.join('/'); const depth = pathParts.length;
            const matchesFilter = key.toLowerCase().includes(filterText);
            const hasChildren = node.children && Object.keys(node.children).length > 0;

            const childContainer = document.createElement('div'); let childMatches = false;
            if (hasChildren) childMatches = renderTagExplorer(node.children, childContainer, currentParts, filterText);
            if (filterText && !matchesFilter && !childMatches) return;
            hasAnyMatch = true;

            const itemDiv = document.createElement('div'); itemDiv.className = "flex flex-col select-none";
            const headerDiv = document.createElement('div');
            
            let isActive = false;
            if (depth > 0) {
                const type = currentParts[0]; const value = currentParts.slice(1).join('/');
                isActive = activeFilters[type] && activeFilters[type].includes(value);
            }

            headerDiv.className = `flex items-center justify-between py-1 px-1.5 hover:bg-slate-700/40 rounded cursor-pointer group transition-all duration-150 ${isActive ? 'bg-tech-secondary/30 border-l-2 border-tech-accent pl-1' : ''}`;
            const leftDiv = document.createElement('div');
            leftDiv.className = "flex items-center gap-1 overflow-hidden"; leftDiv.style.paddingLeft = (depth * 10) + "px";

            if (hasChildren) {
                const isOpen = filterText !== "" || expandedTagPaths.has(currentPath) || (depth === 0 && expandedTagPaths.has("init_done"));
                if (isOpen && !expandedTagPaths.has(currentPath)) expandedTagPaths.add(currentPath);

                const toggleIcon = document.createElement('i');
                toggleIcon.className = `fa-solid fa-chevron-${isOpen ? 'down' : 'right'} text-[9px] w-3 text-center cursor-pointer transition text-slate-500 hover:text-tech-accent`;
                toggleIcon.onclick = (e) => {
                    e.stopPropagation();
                    if (expandedTagPaths.has(currentPath)) expandedTagPaths.delete(currentPath); else expandedTagPaths.add(currentPath);
                    updateTagTree();
                };
                leftDiv.appendChild(toggleIcon);
                if (!isOpen) childContainer.classList.add('hidden');
            } else { leftDiv.innerHTML += '<span class="w-3 shrink-0"></span>'; }

            const tagText = document.createElement('span');
            tagText.className = `truncate transition text-xs ${isActive ? 'text-tech-accent font-bold' : 'text-slate-300 group-hover:text-white'}`;
            tagText.textContent = key; leftDiv.appendChild(tagText);

            const countSpan = document.createElement('span');
            countSpan.className = `text-[9px] px-1 rounded shrink-0 transition ${isActive ? 'bg-tech-accent text-slate-900 font-bold' : 'bg-slate-800 text-slate-500 group-hover:bg-slate-700 group-hover:text-slate-300'}`;
            countSpan.textContent = node.count;

            headerDiv.appendChild(leftDiv); headerDiv.appendChild(countSpan);
            headerDiv.onclick = () => {
                if (depth === 0) { const toggleIcon = headerDiv.querySelector('i'); if (toggleIcon) toggleIcon.click(); } 
                else { const type = currentParts[0]; const value = currentParts.slice(1).join('/'); toggleFacetedFilter(type, value); }
            };

            itemDiv.appendChild(headerDiv); if (hasChildren) itemDiv.appendChild(childContainer);
            parentEl.appendChild(itemDiv);
        });
        return hasAnyMatch;
    }

    function toggleFacetedFilter(type, value) {
        if (!activeFilters[type]) activeFilters[type] = [];
        const idx = activeFilters[type].indexOf(value);
        if (idx > -1) activeFilters[type].splice(idx, 1);
        else activeFilters[type].push(value);
        renderNoteList(); updateTagTree();
    }

    function renderActiveFiltersPanel() {
        els.filtersList.innerHTML = ''; let hasFilters = false;
        Object.keys(activeFilters).forEach(type => {
            activeFilters[type].forEach(value => {
                hasFilters = true;
                const badge = document.createElement('span');
                badge.className = "inline-flex items-center gap-1 bg-tech-secondary/20 border border-tech-secondary/50 text-slate-200 text-xs px-2 py-1 rounded font-mono animate-fade-in";
                badge.innerHTML = `<span class="text-tech-accent font-bold">${type}:</span><span>${value}</span><button class="hover:text-red-400 font-bold ml-1 transition" onclick="removeSingleFilter('${type}', '${value}')">✕</button>`;
                els.filtersList.appendChild(badge);
            });
        });
        
        if (hasFilters) els.noFiltersMsg.classList.add('hidden');
        else els.noFiltersMsg.classList.remove('hidden');
    }

    function removeSingleFilter(type, value) { if (activeFilters[type]) activeFilters[type] = activeFilters[type].filter(v => v !== value); renderNoteList(); updateTagTree(); }
    function clearAllFilters() { activeFilters = {}; renderNoteList(); updateTagTree(); }

  </script>
</body>
