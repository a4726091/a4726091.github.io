<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>CodePen - 泡泡圖5.7</title>
  <link rel="stylesheet" href="./style.css">

</head>
<body>
  <script src="../lib/createjs-2015.11.26.combined.js"></script>
  <script src="../lib/hammer.min.js"></script>
  <script src="../lib/jquery.min.js"></script>
  

<body>
<textarea style="width:80px;height:20px;" id="textbox2"></textarea>
<div>
  <input id="inputColor" type="color" value="#000000" style="width:80px;height:20px;" >
</div>
<label id="uploadImgLable" style="width:80px;height:20px;">
 <!-- 自訂 Input File 檔案上傳按鈕 -->
 <!-- https://www.wfublog.com/2017/10/input-type-file-upload-css-skill.html -->
 <!-- ... https://progressbar.tw/posts/47 傳圖片不難，那上傳同時預覽呢？ ... -->
  <div id = "result"></div>
  <input id="ppic" type="file" name = 'pic' accept = "image/*" onchange = "selectFile()" style="display:none;" />
<h6>.</h6>
</label>
  
<label id="uploadTXTLable" style="width:80px;height:20px;">
  <div id = "resultTXT"></div>
  <input id="ppicTXT" type="file" name = 'pic' accept = ".txt" onchange = "inputSaveData(this.files[0])" style="display:none;" />
<h6>.</h6>
</label> 

<label id="uploadTXTLable2" style="width:80px;height:20px;">
  <div id = "resultTXT2"></div>
  <input id="ppicTXT" type="file" name = 'pic' accept = ".txt" onchange = "inputSaveData(this.files[0])" style="display:none;" />

</label> 

<label id="uploadStandardCSVLabel" style="display:none;">
  <input id="standardCSVInput" 
         type="file" 
         accept=".csv" 
         onchange="handleStandardCSVUpload(this.files[0])" 
         style="display:none;" />
</label>

<!-- 資料清單浮動視窗 -->
<div id="dataListModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#fff; width:85%; max-width:520px; max-height:85%; border-radius:12px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.3);">
        
        <!-- 標題列 -->
        <div style="background:#0aa660; color:white; padding:12px 16px; font-size:18px; font-weight:bold; display:flex; justify-content:space-between; align-items:center;">
            <span>泡泡圖檢查資料清單</span>
            <span id="modalCloseBtn" style="font-size:24px; cursor:pointer; padding:0 8px;">×</span>
        </div>
        
        <!-- 表格區 -->
        <div style="max-height:calc(85vh - 60px); overflow-y:auto; padding:8px;">
            <table id="dataListTable" style="width:100%; border-collapse:collapse; font-size:16px;">
                <thead>
                    <tr style="background:#f0f0f0;">
                        <th style="padding:10px; border:1px solid #ddd; text-align:center; width:80px;">編號</th>
                        <th style="padding:10px; border:1px solid #ddd; text-align:center;">標準值</th>
                        <th style="padding:10px; border:1px solid #ddd; text-align:center;">量測值</th>
                    </tr>
                </thead>
                <tbody id="dataListBody">
                    <!-- 由 JavaScript 動態產生 -->
                </tbody>
            </table>
        </div>
        
        <!-- 底部說明 -->
        <div style="padding:10px 16px; font-size:14px; color:#666; background:#fafafa; text-align:center;">
            點擊任一列可跳轉至該泡泡圖
        </div>
    </div>
</div>



<canvas id="testCanvas" onmousedown="whichButton(event)" onmouseup = "clickup(event)"></canvas>
<h1 id = "consoleLog" style="display:none;">123</h1>
<br>
  <!-- 表格增加功能 -->
  <div id="myDynamicTable"></div>
</br>

</body>
<!-- partial -->
  <script  src="./script.js"></script>

</body>
</html>
