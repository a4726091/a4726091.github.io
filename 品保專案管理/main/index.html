<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA 多專案管理系統</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.4/babel.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.28/dist/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 全域字體與背景設定 */
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background-color: #f3f4f6; }
        
        /* 甘特圖樣式設定 */
        .gantt-bar-container { background-color: #e5e7eb; border-radius: 9999px; height: 1.25rem; width: 100%; position: relative; overflow: hidden; }
        .gantt-bar { height: 100%; border-radius: 9999px; transition: width 0.5s ease-in-out; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.7rem; white-space: nowrap; }
        
        /* 自定義捲軸樣式 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ===== PDF 匯出專用樣式 (關鍵技巧) ===== */
        /* 將此區塊移出可視範圍，但保持渲染狀態，以便 html2canvas 抓取完整內容 */
        

        /* ===== PDF 匯出專用樣式 (修改) ===== */
.pdf-export-hidden {
    position: absolute;
    top: 0;
    left: -99999px;
    width: 1200px; /* A4 比例寬度 */
    background: white;
    padding: 40px; /* 增加內距讓畫面不貼邊 */
}

/* PDF 章節標題樣式 */
.pdf-section-title {
    margin-top: 40px;
    margin-bottom: 20px;
    padding: 10px;
    background-color: #f3f4f6;
    border-left: 5px solid #2563eb;
    font-size: 1.5rem;
    font-weight: bold;
    color: #1f2937;
}

/* 強制換頁標記 (若內容太長可由 JS 偵測高度，或簡單地用 CSS 間距區隔) */
.pdf-page-break {
    height: 50px;
    width: 100%;
}

        /* ===== PDF 匯出時隱藏特定元素 ===== */
        /* 用於隱藏按鈕等不需要出現在報表上的元素 */
        .pdf-export-hidden .pdf-hide {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 解構 React Hook
        const { useState, useEffect } = React;
        


        // 工具函式：產生隨機 ID (Base36 字串)
        const generateId = () => Math.random().toString(36).substr(2, 9);

        // ===== Dashboard 計算工具：計算各 Tab 的進度百分比 =====
        const calcProjectProgress = (project) => {
            // TAB1：部品送樣進度（分母：總零件數，分子：狀態為"結案"的數量）
            const totalParts = project.parts.length;
            const closedParts = project.parts.filter(p => p.status === "結案").length;
            const tab1 = totalParts === 0 ? 0 : Math.round(closedParts / totalParts * 100);

            // TAB2：PPAP 文件完成度（計算所有零件的所有文件狀態）
            const docKeys = ["drawing", "bubble", "eval", "cp", "sip", "sop"];
            let docDone = 0;
            let docTotal = 0;

            project.parts.forEach(p => {
                const d = project.docs[p.id] || {};
                docKeys.forEach(k => {
                    docTotal++;
                    if (d[k] === 2) docDone++; // 狀態 2 代表已完成
                });
            });
            const tab2 = docTotal === 0 ? 0 : Math.round(docDone / docTotal * 100);

            // TAB3：問題點處理率（分母：總問題數，分子：已確認有效或無效的問題）
            const issues = project.issues || [];
            // 此處邏輯：只要狀態是 "有效" 視為解決 (可根據需求修改邏輯)
            const solved = issues.filter(i => i.result === "有效").length; 
            const tab3 = issues.length === 0 ? 100 : Math.round(solved / issues.length * 100);

            return { tab1, tab2, tab3 };
        };
        // ===== 分組工具：依部品欄位分組並計算分組後進度 =====
        const GROUP_FIELDS = {
            all: { label: "整體", field: null },
            vendor: { label: "廠商", field: "vendor" },
            no: { label: "件號", field: "no" },
            provisionalMethod: { label: "是否以暫定工法", field: "provisionalMethod" },
            date: { label: "送樣時間", field: "date" },
            status: { label: "狀態", field: "status" },
            checkDate: { label: "檢查日", field: "checkDate" },
            result: { label: "結果", field: "result" }
        };

        const EMPTY_GROUP_LABEL = "(空白)";

        const getPartGroupValue = (part, groupBy) => {
            const cfg = GROUP_FIELDS[groupBy];
            if (!cfg || groupBy === "all") return "全部";
            const value = (part?.[cfg.field] ?? "").toString().trim();
            return value || EMPTY_GROUP_LABEL;
        };

        const getGroupOptions = (project, groupBy) => {
            if (!project || groupBy === "all") return [];
            const values = (project.parts || []).map(part => getPartGroupValue(part, groupBy));
            return [...new Set(values)].sort((a, b) => a.localeCompare(b, "zh-TW"));
        };

        const getDisplayGroupName = (groupBy, selectedGroup) => {
            if (groupBy === "all") return "整體";
            const label = GROUP_FIELDS[groupBy]?.label || "分組";
            return selectedGroup === "all" ? label : `${label}：${selectedGroup}`;
        };

        const buildGroupedProject = (project, groupBy, selectedGroup) => {
            if (!project || groupBy === "all") return project;

            const groupedParts = (project.parts || []).filter(part => {
                if (selectedGroup === "all") return true;
                return getPartGroupValue(part, groupBy) === selectedGroup;
            });

            const groupedPartNos = new Set(groupedParts.map(part => part.no));

            return {
                ...project,
                parts: groupedParts,
                // 問題點：只顯示與目前分組部品件號有關的資料；未關聯件號者保留
                issues: (project.issues || []).filter(issue => {
                    if (!issue.partNo) return true;
                    return groupedPartNos.has(issue.partNo);
                }),
                // 會議紀錄：只顯示與目前分組部品件號有關的資料；未關聯者保留
                meetings: (project.meetings || []).filter(meeting => {
                    if (!meeting.relatedPartNo) return true;
                    return groupedPartNos.has(meeting.relatedPartNo);
                })
            };
        };

        const calcPartProgressStats = (parts = []) => {
            const totalParts = parts.length;
            const submitted = parts.filter(p => p.date).length;
            const pendingSubmit = totalParts - submitted;
            const measured = parts.filter(p => p.result === "合格" || p.result === "NG").length;
            const qualified = parts.filter(p => p.result === "合格").length;
            const ng = parts.filter(p => p.result === "NG").length;
            const pendingVerify = Math.max(0, submitted - measured);
            const closed = parts.filter(p => p.status === "結案").length;
            const overall = totalParts > 0 ? Math.round(closed / totalParts * 100) : 0;

            return {
                totalParts,
                submitted,
                pendingSubmit,
                measured,
                qualified,
                ng,
                pendingVerify,
                overall
            };
        };
        // ===== 版次 / 修改履歷工具 =====
        const HISTORY_OPTIONS = {
            maxRecords: 500,
            defaultUser: "目前使用者"
        };

        const HISTORY_FIELD_LABELS = {
            vendor: "廠商",
            no: "件號",
            name: "件名",
            provisionalMethod: "是否以暫定工法",
            date: "送樣時間",
            status: "狀態",
            checkDate: "檢查日",
            result: "結果",
            remarks: "備註",
            drawing: "圖面",
            bubble: "泡泡圖",
            eval: "評價表",
            cp: "管制計畫",
            sip: "檢驗標準",
            sop: "作業標準",
            partNo: "關聯件號",
            desc: "問題描述",
            solution: "對策",
            pic: "擔當 / 圖片",
            planDate: "預定完成日",
            title: "任務名稱",
            due: "到期日",
            done: "完成狀態",
            type: "類型",
            subject: "主題",
            attendees: "出席人員",
            relatedPartNo: "關聯部品",
            content: "內容",
                        actionItems: "待辦 / 結論",
            overdueDeferrals: "逾期延後提醒"
        };

        const DOC_STATUS_TEXT = {
            0: "未上傳",
            1: "審核中",
            2: "已確認"
        };

        const HISTORY_MODULE_LABELS = {
            parts: "部品送樣",
            docs: "PPAP 文件",
            issues: "問題點追蹤",
            tasks: "其他任務",
                        meetings: "會議紀錄",
            overdueDeferrals: "逾期延後提醒"
        };

        const historyNow = () => {
            return new Date().toLocaleString("zh-TW", { hour12: false });
        };

        const normalizeHistoryValue = (value, field) => {
            if (field && ["drawing", "bubble", "eval", "cp", "sip", "sop"].includes(field)) {
                return DOC_STATUS_TEXT[value ?? 0] || String(value ?? "");
            }

            if (typeof value === "boolean") {
                return value ? "已完成" : "未完成";
            }

            if (value === undefined || value === null || value === "") {
                return "-";
            }

            if (typeof value === "object") {
                try {
                    return JSON.stringify(value);
                } catch {
                    return String(value);
                }
            }

            return String(value);
        };

        const createHistoryRecord = ({
            module,
            action,
            target,
            field = "",
            oldValue = "",
            newValue = "",
            user = HISTORY_OPTIONS.defaultUser
        }) => ({
            id: generateId(),
            time: historyNow(),
            module,
            moduleLabel: HISTORY_MODULE_LABELS[module] || module,
            action,
            target,
            field,
            fieldLabel: HISTORY_FIELD_LABELS[field] || field,
            oldValue: normalizeHistoryValue(oldValue, field),
            newValue: normalizeHistoryValue(newValue, field),
            user
        });

        const mapById = (items = [], idKey = "id") => {
            const map = {};
            items.forEach(item => {
                if (item && item[idKey]) {
                    map[item[idKey]] = item;
                }
            });
            return map;
        };

        const getPartTargetLabel = (part) => {
            if (!part) return "未知部品";
            return `${part.no || "未填件號"} ${part.name || ""}`.trim();
        };

        const getIssueTargetLabel = (issue) => {
            if (!issue) return "未知問題";
            return `${issue.partNo || "未指定件號"} ${issue.desc || ""}`.trim();
        };

        const getTaskTargetLabel = (task) => {
            if (!task) return "未知任務";
            return task.title || "未命名任務";
        };

        const getMeetingTargetLabel = (meeting) => {
            if (!meeting) return "未知會議";
            return `${meeting.date || ""} ${meeting.subject || meeting.type || "未命名會議"}`.trim();
        };

        const diffItemFields = ({
            prevItem,
            nextItem,
            fields,
            module,
            target
        }) => {
            const records = [];

            fields.forEach(field => {
                const oldValue = prevItem?.[field];
                const newValue = nextItem?.[field];

                if (JSON.stringify(oldValue ?? "") !== JSON.stringify(newValue ?? "")) {
                    records.push(createHistoryRecord({
                        module,
                        action: "修改",
                        target,
                        field,
                        oldValue,
                        newValue
                    }));
                }
            });

            return records;
        };

        const buildListHistoryRecords = ({
            prevList = [],
            nextList = [],
            module,
            fields,
            getTargetLabel
        }) => {
            const records = [];
            const prevMap = mapById(prevList);
            const nextMap = mapById(nextList);

            // 新增
            Object.values(nextMap).forEach(nextItem => {
                if (!prevMap[nextItem.id]) {
                    records.push(createHistoryRecord({
                        module,
                        action: "新增",
                        target: getTargetLabel(nextItem),
                        field: "",
                        oldValue: "",
                        newValue: "新增資料"
                    }));
                }
            });

            // 刪除
            Object.values(prevMap).forEach(prevItem => {
                if (!nextMap[prevItem.id]) {
                    records.push(createHistoryRecord({
                        module,
                        action: "刪除",
                        target: getTargetLabel(prevItem),
                        field: "",
                        oldValue: "刪除前資料",
                        newValue: ""
                    }));
                }
            });

            // 修改
            Object.values(nextMap).forEach(nextItem => {
                const prevItem = prevMap[nextItem.id];
                if (!prevItem) return;

                records.push(...diffItemFields({
                    prevItem,
                    nextItem,
                    fields,
                    module,
                    target: getTargetLabel(nextItem)
                }));
            });

            return records;
        };
        const buildOverdueDeferralHistoryRecords = (prevProject, nextProject) => {
            const records = [];
            const prevDeferrals = prevProject.overdueDeferrals || {};
            const nextDeferrals = nextProject.overdueDeferrals || {};

            const allKeys = new Set([
                ...Object.keys(prevDeferrals),
                ...Object.keys(nextDeferrals)
            ]);

            allKeys.forEach(key => {
                const prevItem = prevDeferrals[key];
                const nextItem = nextDeferrals[key];

                if (!prevItem && nextItem) {
                    records.push(createHistoryRecord({
                        module: "overdueDeferrals",
                        action: "新增",
                        target: nextItem.target || key,
                        field: "overdueDeferrals",
                        oldValue: "",
                        newValue: `延後至 ${nextItem.deferUntil}；原因：${nextItem.reason || "-"}；對策：${nextItem.countermeasure || "-"}`
                    }));
                    return;
                }

                if (prevItem && !nextItem) {
                    records.push(createHistoryRecord({
                        module: "overdueDeferrals",
                        action: "刪除",
                        target: prevItem.target || key,
                        field: "overdueDeferrals",
                        oldValue: `原延後至 ${prevItem.deferUntil}`,
                        newValue: ""
                    }));
                    return;
                }

                if (JSON.stringify(prevItem) !== JSON.stringify(nextItem)) {
                    records.push(createHistoryRecord({
                        module: "overdueDeferrals",
                        action: "修改",
                        target: nextItem.target || key,
                        field: "overdueDeferrals",
                        oldValue: `延後至 ${prevItem.deferUntil}；原因：${prevItem.reason || "-"}；對策：${prevItem.countermeasure || "-"}`,
                        newValue: `延後至 ${nextItem.deferUntil}；原因：${nextItem.reason || "-"}；對策：${nextItem.countermeasure || "-"}`
                    }));
                }
            });

            return records;
        };
        const buildDocsHistoryRecords = (prevProject, nextProject) => {
            const records = [];
            const prevDocs = prevProject.docs || {};
            const nextDocs = nextProject.docs || {};
            const docKeys = ["drawing", "bubble", "eval", "cp", "sip", "sop"];

            const prevPartsMap = mapById(prevProject.parts || []);
            const nextPartsMap = mapById(nextProject.parts || []);

            const addedPartIds = new Set(
                (nextProject.parts || [])
                    .filter(part => !prevPartsMap[part.id])
                    .map(part => part.id)
            );

            const deletedPartIds = new Set(
                (prevProject.parts || [])
                    .filter(part => !nextPartsMap[part.id])
                    .map(part => part.id)
            );

            const allPartIds = new Set([
                ...Object.keys(prevDocs),
                ...Object.keys(nextDocs)
            ]);

            allPartIds.forEach(partId => {
                // 新增 / 刪除部品時，避免把初始化 docs 也記成一堆修改
                if (addedPartIds.has(partId) || deletedPartIds.has(partId)) return;

                const part = nextPartsMap[partId] || prevPartsMap[partId];
                const target = getPartTargetLabel(part);

                docKeys.forEach(key => {
                    const oldValue = prevDocs[partId]?.[key] ?? 0;
                    const newValue = nextDocs[partId]?.[key] ?? 0;

                    if (oldValue !== newValue) {
                        records.push(createHistoryRecord({
                            module: "docs",
                            action: "修改",
                            target,
                            field: key,
                            oldValue,
                            newValue
                        }));
                    }
                });
            });

            return records;
        };

        const buildProjectHistoryRecords = (prevProject, nextProject) => {
            if (!prevProject || !nextProject) return [];

            const records = [];

            records.push(...buildListHistoryRecords({
                prevList: prevProject.parts || [],
                nextList: nextProject.parts || [],
                module: "parts",
                fields: [
                    "vendor",
                    "no",
                    "name",
                    "provisionalMethod",
                    "date",
                    "status",
                    "checkDate",
                    "result",
                    "remarks"
                ],
                getTargetLabel: getPartTargetLabel
            }));

            records.push(...buildDocsHistoryRecords(prevProject, nextProject));
            records.push(...buildOverdueDeferralHistoryRecords(prevProject, nextProject));

            records.push(...buildListHistoryRecords({
                prevList: prevProject.issues || [],
                nextList: nextProject.issues || [],
                module: "issues",
                fields: [
                    "partNo",
                    "desc",
                    "solution",
                    "pic",
                    "planDate",
                    "result"
                ],
                getTargetLabel: getIssueTargetLabel
            }));

            records.push(...buildListHistoryRecords({
                prevList: prevProject.tasks || [],
                nextList: nextProject.tasks || [],
                module: "tasks",
                fields: [
                    "title",
                    "pic",
                    "due",
                    "done"
                ],
                getTargetLabel: getTaskTargetLabel
            }));

            records.push(...buildListHistoryRecords({
                prevList: prevProject.meetings || [],
                nextList: nextProject.meetings || [],
                module: "meetings",
                fields: [
                    "date",
                    "type",
                    "subject",
                    "attendees",
                    "relatedPartNo",
                    "content",
                    "actionItems"
                ],
                getTargetLabel: getMeetingTargetLabel
            }));

            return records;
        };
                // ===== 資料異常提醒 + 逾期追蹤工具 =====
        const ALERT_RULES = {
            sampleCheckDueDays: 7,     // 送樣後超過 7 天仍未檢查，視為逾期
            ngResubmitDueDays: 7      // NG 後超過 7 天仍未結案，視為逾期
        };

        const normalizeDateOnly = (dateValue) => {
            if (!dateValue) return null;
            const d = new Date(dateValue);
            if (isNaN(d.getTime())) return null;
            d.setHours(0, 0, 0, 0);
            return d;
        };

        const diffDaysFromToday = (dateValue) => {
            const target = normalizeDateOnly(dateValue);
            if (!target) return null;

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            return Math.floor((today - target) / (1000 * 60 * 60 * 24));
        };

        const isBlankResult = (value) => {
            return !value || value === "-" || value.toString().trim() === "";
        };
        // ===== 延後提醒判斷工具 =====
        const isActiveDeferral = (deferral) => {
            if (!deferral || !deferral.deferUntil) return false;

            const deferUntil = normalizeDateOnly(deferral.deferUntil);
            if (!deferUntil) return false;

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // 延後日期當天仍視為延後中；隔天開始重新提醒
            return today <= deferUntil;
        };

                        const getActiveOverdueDeferrals = (project) => {
            const visibleParts = project.parts || [];
            const visibleIssues = project.issues || [];
            const visibleTasks = project.tasks || [];

            const visiblePartIds = new Set(visibleParts.map(part => part.id));
            const visibleIssueIds = new Set(visibleIssues.map(issue => issue.id));
            const visibleTaskIds = new Set(visibleTasks.map(task => task.id));

            const partMap = Object.fromEntries(visibleParts.map(part => [part.id, part]));
            const issueMap = Object.fromEntries(visibleIssues.map(issue => [issue.id, issue]));
            const taskMap = Object.fromEntries(visibleTasks.map(task => [task.id, task]));

            const getDeferralRef = (deferral) => {
                if (!deferral) return { refType: "", refId: "" };

                // 新版資料：優先使用 refType / refId
                if (deferral.refType && deferral.refId) {
                    return {
                        refType: deferral.refType,
                        refId: deferral.refId
                    };
                }

                // 舊版資料相容：從 alertKey 反推
                const key = deferral.alertKey || "";

                if (key.startsWith("part-check-overdue-")) {
                    return {
                        refType: "part",
                        refId: key.replace("part-check-overdue-", "")
                    };
                }

                if (key.startsWith("part-result-pending-")) {
                    return {
                        refType: "part",
                        refId: key.replace("part-result-pending-", "")
                    };
                }

                if (key.startsWith("part-ng-resubmit-")) {
                    return {
                        refType: "part",
                        refId: key.replace("part-ng-resubmit-", "")
                    };
                }

                if (key.startsWith("issue-overdue-")) {
                    return {
                        refType: "issue",
                        refId: key.replace("issue-overdue-", "")
                    };
                }

                if (key.startsWith("task-overdue-")) {
                    return {
                        refType: "task",
                        refId: key.replace("task-overdue-", "")
                    };
                }

                return { refType: "", refId: "" };
            };

            const isDeferralInCurrentScope = (deferral) => {
                const { refType, refId } = getDeferralRef(deferral);

                if (refType === "part") return visiblePartIds.has(refId);
                if (refType === "issue") return visibleIssueIds.has(refId);
                if (refType === "task") return visibleTaskIds.has(refId);

                // 無法判斷來源的舊資料，保守顯示
                return true;
            };

            const isDeferralStillOpen = (deferral) => {
                const { refType, refId } = getDeferralRef(deferral);

                // 零件已結案後，延後項目自動移除
                if (refType === "part") {
                    const part = partMap[refId];
                    if (!part) return false;
                    return part.status !== "結案";
                }

                // 問題點已確認有效後，延後項目自動移除
                if (refType === "issue") {
                    const issue = issueMap[refId];
                    if (!issue) return false;
                    return issue.result !== "有效";
                }

                // 任務完成後，延後項目自動移除
                if (refType === "task") {
                    const task = taskMap[refId];
                    if (!task) return false;
                    return !task.done;
                }

                // 無法判斷來源的舊資料，保守顯示
                return true;
            };

            return Object.values(project.overdueDeferrals || {})
                .filter(deferral => isActiveDeferral(deferral))
                .filter(deferral => isDeferralInCurrentScope(deferral))
                .filter(deferral => isDeferralStillOpen(deferral));
        };


                const hasActivePartDeferral = (project, partId) => {
            const part = (project.parts || []).find(p => p.id === partId);

            // 零件不存在或已結案，就不再顯示黃色延後狀態
            if (!part || part.status === "結案") return false;

            const deferrals = Object.values(project.overdueDeferrals || {});

            return deferrals.some(deferral => {
                if (!isActiveDeferral(deferral)) return false;

                // 新版資料：有 refType / refId
                if (deferral.refType === "part" && deferral.refId === partId) {
                    return true;
                }

                // 舊版資料相容：用 alertKey 判斷
                const key = deferral.alertKey || "";

                return (
                    key === `part-check-overdue-${partId}` ||
                    key === `part-result-pending-${partId}` ||
                    key === `part-ng-resubmit-${partId}`
                );
            });
        };

        const getDuplicatePartNos = (parts = []) => {
            const counter = {};
            parts.forEach(part => {
                const no = (part.no || "").trim();
                if (!no) return;
                counter[no] = (counter[no] || 0) + 1;
            });

            return new Set(
                Object.entries(counter)
                    .filter(([_, count]) => count > 1)
                    .map(([no]) => no)
            );
        };

                const buildProjectAlerts = (project) => {
            const parts = project.parts || [];
            const issues = project.issues || [];
            const tasks = project.tasks || [];
            const overdueDeferrals = project.overdueDeferrals || {};

            const duplicateNos = getDuplicatePartNos(parts);
            const dataIssues = [];
            const overdueItems = [];

            const shouldShowOverdue = (alertKey) => {
                const deferral = overdueDeferrals[alertKey];

                // 沒有延後紀錄 → 正常提醒
                if (!deferral || !deferral.deferUntil) return true;

                const deferUntil = normalizeDateOnly(deferral.deferUntil);
                if (!deferUntil) return true;

                const today = new Date();
                today.setHours(0, 0, 0, 0);

                // 今天已經超過延後日期 → 重新提醒
                return today > deferUntil;
            };

            const getDeferralInfo = (alertKey) => {
                return overdueDeferrals[alertKey] || null;
            };

            parts.forEach((part, index) => {
                const rowLabel = `${part.no || `第${index + 1}筆`} ${part.name || ""}`.trim();

                // ===== 資料異常檢查 =====
                if (!part.no || !part.no.trim()) {
                    dataIssues.push({
                        type: "資料缺漏",
                        level: "danger",
                        target: rowLabel,
                        message: "件號空白",
                        source: "部品送樣"
                    });
                }

                if (!part.name || !part.name.trim()) {
                    dataIssues.push({
                        type: "資料缺漏",
                        level: "danger",
                        target: rowLabel,
                        message: "件名空白",
                        source: "部品送樣"
                    });
                }

                if (!part.vendor || !part.vendor.trim()) {
                    dataIssues.push({
                        type: "資料缺漏",
                        level: "warning",
                        target: rowLabel,
                        message: "廠商空白",
                        source: "部品送樣"
                    });
                }

                if (part.no && duplicateNos.has(part.no.trim())) {
                    dataIssues.push({
                        type: "件號重複",
                        level: "danger",
                        target: rowLabel,
                        message: `件號「${part.no}」重複，請確認是否為同一零件`,
                        source: "部品送樣"
                    });
                }

                if (part.date && part.status === "待送樣") {
                    dataIssues.push({
                        type: "狀態不一致",
                        level: "warning",
                        target: rowLabel,
                        message: "已有送樣時間，但狀態仍為「待送樣」",
                        source: "部品送樣"
                    });
                }

                if (part.checkDate && isBlankResult(part.result)) {
                    dataIssues.push({
                        type: "結果缺漏",
                        level: "warning",
                        target: rowLabel,
                        message: "已有檢查日，但結果尚未填寫",
                        source: "部品送樣"
                    });
                }

                if (part.result === "NG" && part.status === "結案") {
                    dataIssues.push({
                        type: "狀態不一致",
                        level: "danger",
                        target: rowLabel,
                        message: "結果為 NG，但狀態為「結案」",
                        source: "部品送樣"
                    });
                }

                if (part.status === "結案" && part.result !== "合格") {
                    dataIssues.push({
                        type: "狀態不一致",
                        level: "warning",
                        target: rowLabel,
                        message: "狀態為「結案」，但結果不是「合格」",
                        source: "部品送樣"
                    });
                }

                const sampleDate = normalizeDateOnly(part.date);
                const checkDate = normalizeDateOnly(part.checkDate);

                if (sampleDate && checkDate && checkDate < sampleDate) {
                    dataIssues.push({
                        type: "日期異常",
                        level: "danger",
                        target: rowLabel,
                        message: "檢查日早於送樣時間",
                        source: "部品送樣"
                    });
                }

                // ===== 逾期追蹤 =====
                const daysAfterSample = diffDaysFromToday(part.date);
                if (
                    part.date &&
                    !part.checkDate &&
                    part.status !== "結案" &&
                    daysAfterSample !== null &&
                    daysAfterSample > ALERT_RULES.sampleCheckDueDays
                ) {
                    const alertKey = `part-check-overdue-${part.id}`;

                    if (shouldShowOverdue(alertKey)) {
                        overdueItems.push({
                            key: alertKey,
                            type: "檢查逾期",
                            level: "danger",
                            target: rowLabel,
                            message: `送樣後已 ${daysAfterSample} 天仍未填檢查日`,
                            source: "部品送樣",
                            refType: "part",
                            refId: part.id,
                            deferral: getDeferralInfo(alertKey)
                        });
                    }
                }

                const daysAfterCheck = diffDaysFromToday(part.checkDate);
                                if (
                    part.checkDate &&
                    isBlankResult(part.result) &&
                    daysAfterCheck !== null &&
                    daysAfterCheck > 0
                ) {
                    const alertKey = `part-result-pending-${part.id}`;

                    if (shouldShowOverdue(alertKey)) {
                        overdueItems.push({
                            key: alertKey,
                            type: "結果未結",
                            level: "warning",
                            target: rowLabel,
                            message: `檢查後已 ${daysAfterCheck} 天仍未填寫結果`,
                            source: "部品送樣",
                            refType: "part",
                            refId: part.id,
                            deferral: getDeferralInfo(alertKey)
                        });
                    }
                }

                if (
                    part.result === "NG" &&
                    part.status === "NG待重送" &&
                    daysAfterCheck !== null &&
                    daysAfterCheck > ALERT_RULES.ngResubmitDueDays
                ) {
                    const alertKey = `part-ng-resubmit-${part.id}`;

                    if (shouldShowOverdue(alertKey)) {
                        overdueItems.push({
                            key: alertKey,
                            type: "NG 重送逾期",
                            level: "danger",
                            target: rowLabel,
                            message: `NG 後已 ${daysAfterCheck} 天仍未結案 / 重送`,
                            source: "部品送樣",
                            refType: "part",
                            refId: part.id,
                            deferral: getDeferralInfo(alertKey)
                        });
                    }
                }
            });

            // ===== 問題點逾期 =====
                        issues.forEach(issue => {
                const daysAfterPlan = diffDaysFromToday(issue.planDate);

                if (
                    issue.planDate &&
                    issue.result !== "有效" &&
                    daysAfterPlan !== null &&
                    daysAfterPlan > 0
                ) {
                    const alertKey = `issue-overdue-${issue.id}`;

                    if (shouldShowOverdue(alertKey)) {
                        overdueItems.push({
                            key: alertKey,
                            type: "問題點逾期",
                            level: "danger",
                            target: issue.partNo || "未指定件號",
                            message: `問題點預定完成日已逾期 ${daysAfterPlan} 天：${issue.desc || ""}`,
                            source: "問題點追蹤",
                            refType: "issue",
                            refId: issue.id,
                            deferral: getDeferralInfo(alertKey)
                        });
                    }
                }
            });

            // ===== 其他任務逾期 =====
                        tasks.forEach(task => {
                const daysAfterDue = diffDaysFromToday(task.due);

                if (
                    task.due &&
                    !task.done &&
                    daysAfterDue !== null &&
                    daysAfterDue > 0
                ) {
                    const alertKey = `task-overdue-${task.id}`;

                    if (shouldShowOverdue(alertKey)) {
                        overdueItems.push({
                            key: alertKey,
                            type: "任務逾期",
                            level: "warning",
                            target: task.title || "未命名任務",
                            message: `任務已逾期 ${daysAfterDue} 天，負責人：${task.pic || "未指定"}`,
                            source: "其他任務",
                            refType: "task",
                            refId: task.id,
                            deferral: getDeferralInfo(alertKey)
                        });
                    }
                }
            });

            return {
                dataIssues,
                overdueItems,
                total: dataIssues.length + overdueItems.length
            };
        };

        // ===== 搜尋與篩選工具：套用在分組後的 project 上 =====
        const createDefaultPartFilters = () => ({
            keyword: "",
            vendor: "all",
            status: "all",
            result: "all",
            provisionalMethod: "all",
            sampleDateFrom: "",
            sampleDateTo: "",
            checkDateFrom: "",
            checkDateTo: ""
        });

        const normalizeText = (value) => {
            return (value ?? "").toString().trim().toLowerCase();
        };

        const isDateInRange = (dateValue, fromValue, toValue) => {
            if (!fromValue && !toValue) return true;
            if (!dateValue) return false;

            const d = new Date(dateValue);
            if (isNaN(d.getTime())) return false;

            if (fromValue) {
                const from = new Date(fromValue);
                if (!isNaN(from.getTime()) && d < from) return false;
            }

            if (toValue) {
                const to = new Date(toValue);
                if (!isNaN(to.getTime()) && d > to) return false;
            }

            return true;
        };

        const getUniquePartValues = (parts = [], field) => {
            return [...new Set(
                parts
                    .map(part => (part?.[field] ?? "").toString().trim())
                    .filter(Boolean)
            )].sort((a, b) => a.localeCompare(b, "zh-TW"));
        };

        const hasActivePartFilters = (filters) => {
            if (!filters) return false;
            return Boolean(
                filters.keyword ||
                filters.vendor !== "all" ||
                filters.status !== "all" ||
                filters.result !== "all" ||
                filters.provisionalMethod !== "all" ||
                filters.sampleDateFrom ||
                filters.sampleDateTo ||
                filters.checkDateFrom ||
                filters.checkDateTo
            );
        };

        const buildFilteredProject = (project, filters) => {
            if (!project || !filters || !hasActivePartFilters(filters)) return project;

            const keyword = normalizeText(filters.keyword);

            const filteredParts = (project.parts || []).filter(part => {
                // 關鍵字搜尋：廠商、件號、件名、狀態、結果、備註都查
                if (keyword) {
                    const searchableText = [
                        part.vendor,
                        part.no,
                        part.name,
                        part.provisionalMethod,
                        part.date,
                        part.status,
                        part.checkDate,
                        part.result,
                        part.remarks
                    ].map(normalizeText).join(" ");

                    if (!searchableText.includes(keyword)) return false;
                }

                if (filters.vendor !== "all" && (part.vendor || "") !== filters.vendor) return false;
                if (filters.status !== "all" && (part.status || "") !== filters.status) return false;
                if (filters.result !== "all" && (part.result || "") !== filters.result) return false;
                if (filters.provisionalMethod !== "all" && (part.provisionalMethod || "") !== filters.provisionalMethod) return false;

                if (!isDateInRange(part.date, filters.sampleDateFrom, filters.sampleDateTo)) return false;
                if (!isDateInRange(part.checkDate, filters.checkDateFrom, filters.checkDateTo)) return false;

                return true;
            });

            const filteredPartNos = new Set(filteredParts.map(part => part.no).filter(Boolean));

            return {
                ...project,
                parts: filteredParts,
                // 問題點：只保留與篩選後件號相關的問題點；如果沒有件號則保留
                issues: (project.issues || []).filter(issue => {
                    if (!issue.partNo) return true;
                    return filteredPartNos.has(issue.partNo);
                }),
                // 會議紀錄：只保留與篩選後件號相關的會議；如果沒有關聯部品則保留
                meetings: (project.meetings || []).filter(meeting => {
                    if (!meeting.relatedPartNo) return true;
                    return filteredPartNos.has(meeting.relatedPartNo);
                })
            };
        };

        /* ===== IndexedDB 基礎工具：瀏覽器端資料庫操作 ===== */
        const DB_NAME = "qa-project-db";
        const STORE_NAME = "kv"; // Key-Value 儲存區
        const DB_VERSION = 2;    // 資料庫版本

        // 開啟資料庫並處理版本升級 (Schema Migration)
        const openDB = () =>
            new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                
                req.onupgradeneeded = (e) => {
                    const db = req.result;
                    const oldVersion = e.oldVersion;

                    switch (oldVersion) {
                        case 0:
                            // v0 ➜ v1：第一次建立資料庫，新增 kv store
                            if (!db.objectStoreNames.contains("kv")) {
                                db.createObjectStore("kv");
                            }
                            // 注意：這裡不加 break，讓它繼續往下執行 (Waterfall pattern)
                        case 1:
                            // v1 ➜ v2：資料結構拆分，將 projects 獨立出來 (若未來需要更細緻的查詢)
                            if (!db.objectStoreNames.contains("projects")) {
                                const projectStore = db.createObjectStore("projects");
                                // 嘗試遷移舊資料
                                const tx = e.target.transaction;
                                const kvStore = tx.objectStore("kv");
                                const getReq = kvStore.get("qa-projects");
                                getReq.onsuccess = () => {
                                    const projects = getReq.result || {};
                                    Object.entries(projects).forEach(([id, project]) => {
                                        projectStore.put(project, id);
                                    });
                                };
                            }
                    }
                };

                req.onsuccess = () => resolve(req.result);
                req.onerror = () => reject(req.error);
            });

        // IndexedDB: 寫入資料
        const idbSet = async (key, value) => {
            const db = await openDB();
            const tx = db.transaction(STORE_NAME, "readwrite");
            tx.objectStore(STORE_NAME).put(value, key);
        };

        // IndexedDB: 讀取資料
        const idbGet = async (key) => {
            const db = await openDB();
            const tx = db.transaction(STORE_NAME, "readonly");
            return new Promise(resolve => {
                const req = tx.objectStore(STORE_NAME).get(key);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => resolve(null);
            });
        };

        // IndexedDB: 清空資料 (用於匯入新備份前)
        const idbClear = async () => {
            const db = await openDB();
            const tx = db.transaction(STORE_NAME, "readwrite");
            tx.objectStore(STORE_NAME).clear();
        };


        // ===== 資料備份與還原功能 =====

        // 匯入前自動備份 (防呆機制)
        const autoBackupBeforeImport = (projects) => {
            const payload = {
                schemaVersion: 2,
                projects
            };
            const blob = new Blob(
                [JSON.stringify(payload, null, 2)],
                { type: "application/json" }
            );
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            // 檔名加上時間戳記
            a.href = url;
            a.download = `QA_AutoBackup_BeforeImport_${new Date().toISOString().replace(/[:.]/g, "-")}.json`;
            a.click();
            URL.revokeObjectURL(url);
        };

        // 匯出 JSON 備份函式
        const exportJSONBackup = (projects) => {
            const payload = {
                schemaVersion: 2,
                projects
            };
            const dataStr = JSON.stringify(payload, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = `QA_Backup_${new Date().toISOString().slice(0,10)}.json`; // 檔名：QA_Backup_2025-01-01.json
            a.click();
            
            // 記錄最後備份時間
            idbSet("qa-last-backup", Date.now());
            localStorage.setItem("qa-last-backup", Date.now());

            URL.revokeObjectURL(url);
        };

        // 正規化匯入資料 (處理不同版本 Schema)
        const normalizeImportedData = (data) => {
            // v1：舊版沒有 schemaVersion，直接是 projects 物件
            if (!data.schemaVersion) {
                return {
                    schemaVersion: 2,
                    projects: data
                };
            }
            switch (data.schemaVersion) {
                case 1:
                    // 預留相容性處理
                    return {
                        schemaVersion: 2,
                        projects: data.projects
                    };
                case 2:
                    return data; // 目前版本
                default:
                    throw new Error("不支援的資料版本");
            }
        };

        // 匯入 JSON 備份流程
        const importJSONBackup = (setProjects, setCurrentId) => {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "application/json";

            input.onchange = () => {
                const file = input.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async () => {
                    try {
                        const rawData = JSON.parse(reader.result);
                        const normalized = normalizeImportedData(rawData);
                        const data = normalized.projects;

                        // 🔒 匯入前自動備份目前資料（防呆）
                        const currentProjects = (await idbGet("qa-projects")) || {};
                        autoBackupBeforeImport(currentProjects);

                        if (!confirm("已自動備份目前資料。\n確定要匯入並覆蓋現有資料？")) {
                            return;
                        }

                        // 清除 IndexedDB 原資料
                        await idbClear();

                        // 更新 React State (介面重繪)
                        setProjects(data);

                        // 重設目前選中的專案 ID
                        const firstId = Object.keys(data)[0] || null;
                        setCurrentId(firstId);

                        alert("資料匯入完成");
                    } catch {
                        alert("JSON 格式錯誤，匯入失敗");
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        };

        /* ===== PDF 匯出功能 (截圖法) ===== */
        const exportPageToPDF = async () => {
            const { jsPDF } = window.jspdf;

            // ⚠️ 抓取預先定義好的 "完整內容" 隱藏區域 (排除左側 Sidebar 與捲軸影響)
            const content = document.querySelector(".pdf-export-hidden");
            if (!content) {
                alert("找不到匯出區域");
                return;
            }

            // 使用 html2canvas 將 DOM 轉為 Canvas
            const canvas = await html2canvas(content, {
                scale: 1,              // 解析度倍率
                useCORS: true,         // 允許跨域圖片 (若有)
                backgroundColor: "#ffffff"
            });

            const imgData = canvas.toDataURL("image/png");
            const pdf = new jsPDF("p", "mm", "a4"); // A4 縱向

            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();

            // 計算圖片在 PDF 中的縮放尺寸
            const imgWidth = pageWidth;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;

            let heightLeft = imgHeight;
            let position = 0;

            // 第一頁
            pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
            heightLeft -= pageHeight;

            // 🔁 自動分頁邏輯：如果圖片高度超過一頁，則新增頁面
            while (heightLeft > 0) {
                position = heightLeft - imgHeight;
                pdf.addPage();
                pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
                heightLeft -= pageHeight;
            }

            pdf.save("QA專案畫面匯出.pdf");
        };

        // 預設示範資料（若 localStorage/IndexedDB 為空時使用）
        const demoProjects = {
            "proj-2025ev-new": {
                info: { model: "Model-X 2025 (EV)", purpose: "新開發件", pm: "Alex Chen", sop: "2025-12-01" },
                parts: [
                    { id: "1", vendor: "供應商A", no: "805-A01", name: "前保險桿總成", provisionalMethod: "否", date: "2025-05-01", status: "結案", checkDate: "2025-05-05", result: "合格", sketch: "", remarks: "", remarksSketch: "" },
                    { id: "2", vendor: "供應商B", no: "805-B02", name: "左後視鏡", provisionalMethod: "是", date: "2025-05-10", status: "NG待重送", checkDate: "2025-05-12", result: "NG", sketch: "", remarks: "", remarksSketch: "" },
                ],
                docs: {

                },
                issues: [
                    { id: "101", partNo: "805-B02", desc: "鏡面組裝間隙過大 (>3mm)", solution: "修正模具 Slide core", pic: "王小明", planDate: "2025-05-15", result: "待確認" }
                ],
                tasks: [
                    { id: "201", title: "確認廠商 ISO9001 證書效期", pic: "Admin", due: "2025-06-01", done: false }
                ],
                meetings: [
                    { 
                        id: "m1",

                        type: "試模檢討", 
                        subject: "前保險桿 T1 試模檢討會", 
                        attendees: "Alex, 供應商A",

                        content: "1. 結合線位置需調整\n2. 咬花深度不足", 
                        actionItems: "請廠商於 5/25 前提供修正計畫" 
                    }
                ]
            }
        };

        // ===== 側邊欄組件 (Sidebar) =====
                const Sidebar = ({
            currentProjectId,
            setCurrentProjectId,
            projects,
            setProjects,
            setCurrentId,
            collapsed,
            setCollapsed,
            setActiveView,
            setActiveTab
        }) => {
            // 新增專案 Modal 的狀態
            const [showNewProject, setShowNewProject] = useState(false);
            const [newModel, setNewModel] = useState("");
            const [newPurpose, setNewPurpose] = useState("新開發件");
            const [newOwner, setNewOwner] = useState("");

                // ===== 專案提醒面板：資料異常提醒 + 逾期追蹤 =====

                    return;
                }

                    ...prev,
                    overdueDeferrals: {
                        ...(prev.overdueDeferrals || {}),

                            alertKey: deferralTarget.key,
                            type: deferralTarget.type,
                            target: deferralTarget.target,
                            source: deferralTarget.source,
                            message: deferralTarget.message,
                            refType: deferralTarget.refType || "",
                            refId: deferralTarget.refId || "",

                    name: f.get("name"),
                    provisionalMethod: f.get("provisionalMethod"),
                    date: f.get("date"),
                    status: f.get("status"),
                    checkDate: f.get("checkDate") || "",
                    result: f.get("result") || "",
                    remarks: f.get("remarks") || ""

                    ...prev,

            // --- 圖片縮放、全螢幕拖曳控制狀態 ---
            const [imgScale, setImgScale] = useState(1);
            const [offset, setOffset] = useState({ x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

            const handleWheelZoom = (e) => {
                e.preventDefault();
                if (e.deltaY < 0) setImgScale(prev => Math.min(prev + 0.1, 8)); // 最大放大 8 倍
                else setImgScale(prev => Math.max(prev - 0.1, 0.2));
            };

            const handleMouseDown = (e) => {
                e.preventDefault();
                setIsDragging(true);
                setDragStart({ x: e.clientX - offset.x, y: e.clientY - offset.y });
            };

            const handleMouseMove = (e) => {
                if (!isDragging) return;
                setOffset({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y });
            };

            const handleMouseUp = () => setIsDragging(false);

            const resetImgTransform = () => {

            // ===== 新增：匯出 Excel 功能 =====
const handleExportToExcel = () => {

        "檢查日": p.checkDate || "",
        "結果": p.result || "",
        "備註": p.remarks || ""
    }));

    // 建立工作簿
    const ws = XLSX.utils.json_to_sheet(exportData);
    
    // 調整欄位寬度（可選）
    ws['!cols'] = [
        { wch: 6 },   // 序列
        { wch: 15 },  // 廠商
        { wch: 15 },  // 件號
        { wch: 30 },  // 件名

        { wch: 12 },
        { wch: 12 },
        { wch: 12 },
        { wch: 10 },

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "部品送樣清單");

    // 下載檔案
    const fileName = `${project.info.model || '專案'}_部品送樣清單_${new Date().toISOString().slice(0,10)}.xlsx`;

};

                e.preventDefault();
