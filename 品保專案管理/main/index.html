                // 處理簡圖上傳 (轉換為 Base64)
                const file = f.get("sketch");
                let sketchData = editItem ? editItem.sketch : "";
                if (file && file.size > 0) {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    await new Promise((resolve) => {
                        reader.onload = () => {
                            sketchData = reader.result;
                            resolve();
                        };
                    });
                }
                
                // 處理備註簡圖上傳
                const remarksFile = f.get("remarksSketch");
                let remarksSketchData = editItem ? editItem.remarksSketch : "";
                if (remarksFile && remarksFile.size > 0) {
                    const reader = new FileReader();
                    reader.readAsDataURL(remarksFile);
                    await new Promise((resolve) => {
                        reader.onload = () => {
                            remarksSketchData = reader.result;
                            resolve();
                        };
                    });
                }

                // 建立資料物件
                const item = {
                    id: editItem ? editItem.id : generateId(),
                    vendor: f.get("vendor"),
                    no: f.get("no"),
                    name: f.get("name"),
                    provisionalMethod: f.get("provisionalMethod"),
                    date: f.get("date"),
                    status: f.get("status"),
                    checkDate: f.get("checkDate") || "",
                    result: f.get("result") || "",
                    sketch: sketchData,
                    remarks: f.get("remarks") || "",
                    remarksSketch: remarksSketchData
                };

                // 更新 State
                if (editItem) {
                    updateProject(p => ({ ...p, parts: p.parts.map(x => x.id === item.id ? item : x) }));
                } else {
                    updateProject(p => ({
                        ...p,
                        parts: [...p.parts, item],
                        docs: { ...p.docs, [item.id]: { drawing: 0, bubble: 0, eval: 0, cp: 0, sip: 0, sop: 0 } }
                    }));
                }
                setIsModalOpen(false);
                setEditItem(null);
                setSketchPreview("");
                setRemarksSketchPreview("");
            };

            // 刪除零件
            const handleDelete = (id) => {
                if (confirm("確定刪除此零件？相關文件資料也會一併移除")) {
                    updateProject(p => {
                        const { [id]: _, ...newDocs } = p.docs; // 移除對應的 doc
                        return { ...p, parts: p.parts.filter(x => x.id !== id), docs: newDocs };
                    });
                }
            };

            // 狀態顏色對應
            const getStatusColor = (s) => {
                switch(s) {
                    case "結案": return "bg-green-500";
                    case "NG待重送": return "bg-red-500";
                    case "待檢": return "bg-blue-500";
                    default: return "bg-gray-400";
                }
            };

            // 甘特圖寬度對應 (視覺化進度)
            const getGanttWidth = (s) => {
                const map = { "結案": "100%", "NG待重送": "40%", "待檢": "60%" };
                return map[s] || "20%";
            };
            // 已輸入延後提醒且尚未超過延後日期的零件，以黃色底色顯示
            const isPartDeferred = (partId) => {
                return hasActivePartDeferral(project, partId);
            };
            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div className="p-4 bg-gray-50 border-b flex justify-between items-center">
                                                <div>
                            <h3 className="font-bold text-gray-700">1. 部品送樣清單</h3>
                            <div className="text-xs text-gray-500 mt-1">
                                <span className="inline-block w-3 h-3 bg-yellow-100 border border-yellow-300 rounded mr-1 align-middle"></span>
                                黃色列：已設定延後提醒，且尚未超過延後日期
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button
            onClick={handleExportToExcel}
            className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-md text-sm pdf-hide flex items-center gap-1"
        >
            <i className="fas fa-file-export"></i> 匯出 Excel
        </button>
                            <button
                                onClick={handleImportParts}
                                className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-md text-sm pdf-hide"
                            >
                                <i className="fas fa-file-import mr-1"></i> 匯入 Excel / CSV
                            </button>
                            <button
                                onClick={() => { setEditItem(null); setIsModalOpen(true); }}
                                className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm pdf-hide"
                            >
                                <i className="fas fa-plus mr-1"></i> 新增零件
                            </button>
                        </div>
                    </div>
                    
                    <div className="overflow-x-auto">
                        <table className="w-full text-sm">
                            <thead className="bg-gray-50 text-xs uppercase text-gray-700">
                                <tr>
                                    <th className="px-4 py-3 text-left">序列</th>
                                    <th className="px-4 py-3 text-left">廠商</th>
                                    <th className="px-4 py-3 text-left">件號</th>
                                    <th className="px-4 py-3 text-left">件名</th>
                                    <th className="px-4 py-3">是否以暫定工法</th>
                                    <th className="px-4 py-3">送樣時間</th>
                                    <th className="px-4 py-3">狀態</th>
                                    <th className="px-4 py-3">檢查日</th>
                                    <th className="px-4 py-3">結果</th>
                                    
                                    <th className="px-4 py-3">備註</th>
                                    <th className="px-4 py-3 text-right pdf-hide">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                                                {project.parts.map((p, index) => (
                                    <tr
                                        key={p.id}
                                        className={`border-b ${isPartDeferred(p.id) ? "bg-yellow-100 hover:bg-yellow-200" : "hover:bg-gray-50"}`}
                                    >
                                        <td className="px-4 py-3">{index + 1}</td>
                                        <td className="px-4 py-3">{p.vendor}</td>
                                        <td className="px-4 py-3 font-medium">{p.no}</td>
                                        <td className="px-4 py-3 flex items-center">
                                            {p.name}
                                            {/* 顯示簡圖縮圖，點擊可放大 */}
                                            {p.sketch && <img src={p.sketch} alt="簡圖" className="ml-2 w-10 h-10 object-contain rounded cursor-pointer" onClick={() => setSelectedSketch(p.sketch)} />}
                                        </td>
                                        <td className="px-4 py-3">{p.provisionalMethod}</td>
                                        <td className="px-4 py-3">{p.date}</td>
                                        <td className="px-4 py-3"><span className={`${getStatusColor(p.status)} text-white px-2 py-1 rounded text-xs`}>{p.status}</span></td>
                                        <td className="px-4 py-3">{p.checkDate || "-"}</td>
                                        <td className="px-4 py-3 font-bold" style={{color: p.result==="合格"?"green":p.result==="NG"?"red":"gray"}}>{p.result || "-"}</td>
                                        
                                        <td className="px-4 py-3 whitespace-pre-line">
                                            {p.remarks}
                                            {/* 顯示備註圖縮圖 */}
                                            {p.remarksSketch && <img src={p.remarksSketch} alt="備註簡圖" className="ml-2 w-10 h-10 object-contain rounded cursor-pointer" onClick={() => setSelectedSketch(p.remarksSketch)} />}
                                        </td>
                                        <td className="px-4 py-3 text-right pdf-hide">
                                            <button onClick={() => { setEditItem(p); setIsModalOpen(true); }} className="text-blue-600 mr-3"><i className="fas fa-edit"></i></button>
                                            <button onClick={() => handleDelete(p.id)} className="text-red-500"><i className="fas fa-trash-alt"></i></button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {project.parts.length === 0 && <div className="text-center py-8 text-gray-400">尚未新增任何零件</div>}
                    </div>

                    {/* 新增/編輯 Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                            <div className="bg-white rounded-xl w-[800px] max-h-[80vh] flex flex-col">
                                <h3 className="text-lg font-bold mb-4">{editItem ? "編輯零件" : "新增零件"}</h3>
                                <form onSubmit={handleSave} className="flex-1 overflow-y-auto p-6 space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium">廠商</label>
                                        <input name="vendor" defaultValue={editItem?.vendor} className="w-full border rounded p-2"/>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="block text-sm font-medium">件號</label><input name="no" defaultValue={editItem?.no} required className="w-full border rounded p-2"/></div>
                                        <div><label className="block text-sm font-medium">件名</label><input name="name" defaultValue={editItem?.name} required className="w-full border rounded p-2"/></div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium">是否以暫定工法</label>
                                        <select name="provisionalMethod" defaultValue={editItem?.provisionalMethod || "否"} className="w-full border rounded p-2">
                                            <option>是</option>
                                            <option>否</option>
                                        </select>
                                    </div>
                                    <div><label className="block text-sm font-medium">送樣時間</label><input type="date" name="date" defaultValue={editItem?.date} className="w-full border rounded p-2"/></div>
                                    <div><label className="block text-sm font-medium">檢查日</label><input type="date" name="checkDate" defaultValue={editItem?.checkDate} className="w-full border rounded p-2"/></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium">狀態</label>
                                            <select name="status" defaultValue={editItem?.status || "待送樣"} className="w-full border rounded p-2">
                                                <option>待送樣</option><option>待檢</option><option>NG待重送</option><option>結案</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium">結果</label>
                                            <select name="result" defaultValue={editItem?.result || "-"} className="w-full border rounded p-2">
                                                <option>-</option><option>合格</option><option>NG</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium">上傳簡圖</label>
                                        <input type="file" name="sketch" accept="image/*" className="w-full border rounded p-2"/>
                                        {sketchPreview && <img src={sketchPreview} alt="預覽" className="mt-2 w-20 h-20 object-contain"/>}
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium">備註</label>
                                        <textarea name="remarks" defaultValue={editItem?.remarks} className="w-full border rounded p-2" rows="3"></textarea>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium">上傳備註簡圖</label>
                                        <input type="file" name="remarksSketch" accept="image/*" className="w-full border rounded p-2"/>
                                        {remarksSketchPreview && <img src={remarksSketchPreview} alt="備註預覽" className="mt-2 w-20 h-20 object-contain"/>}
                                    </div>
                                    <div className="flex justify-end gap-3 mt-6">
                                        <button type="button" onClick={() => {setIsModalOpen(false); setEditItem(null); setSketchPreview(""); setRemarksSketchPreview("");}} className="px-4 py-2 text-gray-600">取消</button>
                                        <button type="submit" className="px-5 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">儲存</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                    
                    {/* 圖片放大檢視 Modal */}
                    {selectedSketch && (
                        <div 
                            className="fixed inset-0 bg-black z-50 flex flex-col justify-center items-center select-none overflow-hidden"
                            onMouseMove={handleMouseMove}
                            onMouseUp={handleMouseUp}
                            onMouseLeave={handleMouseUp}
                        >
                            {/* 右上角浮動關閉按鈕 */}
                            <button 
                                onClick={() => { setSelectedSketch(null); resetImgTransform(); }} 
                                className="absolute top-4 right-4 bg-gray-800 bg-opacity-60 text-white rounded-full w-12 h-12 flex items-center justify-center hover:bg-red-600 transition-colors z-[60]"
                            >
                                <i className="fas fa-times text-2xl"></i>
                            </button>
                            
                            {/* 底部操作提示 */}
                            <div className="absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-gray-900 bg-opacity-75 text-white px-5 py-2 rounded-full text-sm z-[60] pointer-events-none tracking-wide">
                                <i className="fas fa-search-plus mr-2"></i>滾輪放大縮小 / <i className="fas fa-arrows-alt mr-2"></i>按住滑鼠左鍵拖曳
                            </div>

                            {/* 圖片顯示及拖曳觸發區域 */}
                            <div 
                                onWheel={handleWheelZoom} 
                                onMouseDown={handleMouseDown}
                                className={`w-full h-full flex justify-center items-center ${isDragging ? 'cursor-grabbing' : 'cursor-grab'}`}
                            >
                                <img 
                                    src={selectedSketch} 
                                    alt="放大簡圖" 
                                    className="max-w-full max-h-full object-contain pointer-events-none" 
                                    style={{ 
                                        transform: `translate(${offset.x}px, ${offset.y}px) scale(${imgScale})`, 
                                        transition: isDragging ? 'none' : 'transform 0.1s ease-out', 
                                        transformOrigin: 'center center' 
                                    }} 
                                />
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ===== Tab2: PPAP 文件矩陣組件 =====
        const Tab2_Docs = ({ project, updateProject }) => {
            const docTypes = [
                { key: "drawing", label: "圖面" },
                { key: "bubble", label: "泡泡圖" },
                { key: "eval", label: "評價表" },
                { key: "cp", label: "管制計畫" },
                { key: "sip", label: "檢驗標準" },
                { key: "sop", label: "作業標準" },
            ];

            // 切換狀態邏輯：0(未上傳) -> 1(審核中) -> 2(已確認) -> 0...
            const toggle = (partId, key) => {
                updateProject(p => ({
                    ...p,
                    docs: {
                        ...p.docs,
                        [partId]: {
                            ...(p.docs[partId] || {}),
                            [key]: ((p.docs[partId]?.[key] || 0) + 1) % 3
                        }
                    }
                }));
            };

            // 取得對應圖示 Class
            const getIcon = (v) => {
                if (v === 2) return "text-green-500 fa-check-circle";
                if (v === 1) return "text-yellow-500 fa-clock";
                return "text-gray-300 fa-circle";
            };

            // 計算單一零件的文件完成度
            const progress = (partId) => {
                const d = project.docs[partId] || {};
                const done = docTypes.filter(t => d[t.key] === 2).length;
                return Math.round(done / docTypes.length * 100);
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div className="p-4 bg-gray-50 border-b flex justify-between items-center">
                        <h3 className="font-bold text-gray-700">2. PPAP 資料準備狀況</h3>
                        <div className="text-xs text-gray-500 flex gap-4 items-center">
                            <span><i className="fas fa-circle text-gray-300"></i> 未上傳</span>
                            <span><i className="fas fa-clock text-yellow-500"></i> 審核中</span>
                            <span><i className="fas fa-check-circle text-green-500"></i> 已確認</span>
                        </div>
                    </div>
                    <table className="w-full text-sm">
                        <thead className="bg-gray-50 text-xs uppercase text-gray-700">
                            <tr>
                                <th className="px-4 py-3 text-left">件號 / 件名</th>
                                {docTypes.map(d => <th key={d.key} className="px-2 py-3">{d.label}</th>)}
                                <th className="px-4 py-3">完成度</th>
                            </tr>
                        </thead>
                        <tbody>
                            {project.parts.map(part => {
                                const prog = progress(part.id);
                                return (
                                    <tr key={part.id} className="border-b hover:bg-gray-50">
                                        <td className="px-4 py-3 text-left">
                                            <div className="font-medium">{part.no}</div>
                                            <div className="text-xs text-gray-500">{part.name}</div>
                                        </td>
                                        {/* 點擊圖示切換狀態 */}
                                        {docTypes.map(d => (
                                            <td key={d.key} className="text-center cursor-pointer" onClick={() => toggle(part.id, d.key)}>
                                                <i className={`fas ${getIcon(project.docs[part.id]?.[d.key])} text-lg`}></i>
                                            </td>
                                        ))}
                                        <td className="px-4 py-3">
                                            <div className="w-32 bg-gray-200 rounded-full h-2">
                                                <div className="bg-blue-600 h-2 rounded-full" style={{width: `${prog}%`}}></div>
                                            </div>
                                            <span className="text-xs text-gray-500">{prog}%</span>
                                        </td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                    {project.parts.length === 0 && <div className="text-center py-8 text-gray-400">尚未有部品資料</div>}
                </div>
            );
        };

        // ===== Tab3: 問題點追蹤組件 =====
        const Tab3_Issues = ({ project, updateProject }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [edit, setEdit] = useState(null);

            // 儲存問題點
            const save = (e) => {
                e.preventDefault();
                const f = new FormData(e.target);
                const item = {
                    id: edit ? edit.id : generateId(),
                    partNo: f.get("partNo"),
                    desc: f.get("desc"),
                    solution: f.get("solution"),
                    pic: f.get("pic"),
                    planDate: f.get("planDate"),
                    result: f.get("result")
                };
                if (edit) {
                    updateProject(p => ({ ...p, issues: p.issues.map(i => i.id === item.id ? item : i) }));
                } else {
                    updateProject(p => ({ ...p, issues: [...p.issues, item] }));
                }
                setIsOpen(false);
                setEdit(null);
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div className="p-4 bg-gray-50 border-b flex justify-between">
                        <h3 className="font-bold text-gray-700">3. 問題點追蹤</h3>
                        <button onClick={() => { setEdit(null); setIsOpen(true); }} className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-md text-sm">
                            <i className="fas fa-plus mr-1"></i> 新增問題
                        </button>
                    </div>
                    <table className="w-full text-sm">
                        <thead className="bg-gray-50 text-xs uppercase">
                            <tr>
                                <th className="px-4 py-3 text-left">件號</th>
                                <th className="px-4 py-3">問題描述</th>
                                <th className="px-4 py-3">對策</th>
                                <th className="px-4 py-3">擔當</th>
                                <th className="px-4 py-3">預定完成</th>
                                <th className="px-4 py-3">確認</th>
                                <th className="px-4 py-3 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            {project.issues.map(i => (
                                <tr key={i.id} className="border-b hover:bg-gray-50">
                                    <td className="px-4 py-3 font-medium">{i.partNo}</td>
                                    <td className="px-4 py-3 text-red-600">{i.desc}</td>
                                    <td className="px-4 py-3 text-gray-600">{i.solution}</td>
                                    <td className="px-4 py-3"><span className="bg-gray-100 px-2 py-1 rounded text-xs">{i.pic}</span></td>
                                    <td className="px-4 py-3">{i.planDate}</td>
                                    <td className="px-4 py-3">
                                        <span className={`px-2 py-1 rounded text-xs text-white ${i.result === "有效" ? "bg-green-500" : "bg-orange-500"}`}>
                                            {i.result || "待確認"}
                                        </span>
                                    </td>
                                    <td className="px-4 py-3 text-right">
                                        <button onClick={() => { setEdit(i); setIsOpen(true); }} className="text-blue-600 mr-3"><i className="fas fa-edit"></i></button>
                                        <button onClick={() => updateProject(p => ({ ...p, issues: p.issues.filter(x => x.id !== i.id) }))} className="text-red-500"><i className="fas fa-trash-alt"></i></button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                    {project.issues.length === 0 && <div className="text-center py-8 text-gray-400">尚無問題點</div>}
                    
                    {/* 新增/編輯 Modal */}
                    {isOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                            <div className="bg-white rounded-lg p-6 w-full max-w-lg">
                                <h3 className="text-lg font-bold mb-4">{edit ? "編輯" : "新增"}問題點</h3>
                                <form onSubmit={save} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium">關聯件號</label>
                                        <select name="partNo" defaultValue={edit?.partNo} className="w-full border rounded p-2">
                                            {project.parts.map(p => <option key={p.id} value={p.no}>{p.no} {p.name}</option>)}
                                        </select>
                                    </div>
                                    <textarea name="desc" defaultValue={edit?.desc} placeholder="問題描述" rows="2" required className="w-full border rounded p-2"></textarea>
                                    <textarea name="solution" defaultValue={edit?.solution} placeholder="對策內容" rows="2" required className="w-full border rounded p-2"></textarea>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="block text-sm font-medium">擔當</label><input name="pic" defaultValue={edit?.pic} className="w-full border rounded p-2"/></div>
                                        <div><label className="block text-sm font-medium">預定完成日</label><input type="date" name="planDate" defaultValue={edit?.planDate} className="w-full border rounded p-2"/></div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium">效果確認</label>
                                        <select name="result" defaultValue={edit?.result || "待確認"} className="w-full border rounded p-2">
                                            <option>待確認</option><option>有效</option><option>無效</option>
                                        </select>
                                    </div>
                                    <div className="flex justify-end gap-3">
                                        <button type="button" onClick={() => {setIsOpen(false); setEdit(null);}} className="px-4 py-2 text-gray-600">取消</button>
                                        <button type="submit" className="px-5 py-2 bg-blue-600 text-white rounded">儲存</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ===== Tab4: 其他任務 To-Do List 組件 =====
        const Tab4_Tasks = ({ project, updateProject }) => {
            const [newTask, setNewTask] = useState("");
            
            // 新增任務
            const add = () => {
                if (!newTask.trim()) return;
                updateProject(p => ({
                    ...p,
                    tasks: [...p.tasks, { id: generateId(), title: newTask, pic: "我", due: new Date().toISOString().split("T")[0], done: false }]
                }));
                setNewTask("");
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-4xl mx-auto">
                    <h3 className="font-bold mb-6 flex justify-between items-center">
                        <span><i className="fas fa-clipboard-list mr-2"></i> 其他待辦事項</span>
                        <span className="text-sm text-gray-500">{project.tasks.filter(t => t.done).length} / {project.tasks.length} 完成</span>
                    </h3>
                    <div className="flex gap-3 mb-6">
                        <input
                            type="text"
                            value={newTask}
                            onChange={e => setNewTask(e.target.value)}
                            onKeyPress={e => e.key === "Enter" && add()}
                            placeholder="輸入新任務..."
                            className="flex-1 border rounded-lg px-4 py-2"/>
                        <button onClick={add} className="bg-blue-600 text-white px-6 rounded-lg hover:bg-blue-700">新增</button>
                    </div>
                    <div className="space-y-3">
                        {project.tasks.map(t => (
                            <div key={t.id} className={`flex items-center p-4 rounded-lg border ${t.done ? "bg-gray-50" : "bg-white"}`}>
                                <input type="checkbox" checked={t.done} onChange={() => updateProject(p => ({
                                    ...p, tasks: p.tasks.map(x => x.id === t.id ? {...x, done: !x.done} : x)
                                }))} className="mr-4 w-5 h-5"/>
                                <div className="flex-1">
                                    <div className={`${t.done ? "line-through text-gray-400" : ""}`}>{t.title}</div>
                                    <div className="text-xs text-gray-500">Due: {t.due} • {t.pic}</div>
                                </div>
                                <button onClick={() => updateProject(p => ({ ...p, tasks: p.tasks.filter(x => x.id !== t.id) }))} className="text-gray-400 hover:text-red-500">
                                    <i className="fas fa-times"></i>
                                </button>
                            </div>
                        ))}
                        {project.tasks.length === 0 && <div className="text-center text-gray-400 py-8">尚無待辦事項</div>}
                    </div>
                </div>
            );
        };
        
        // ===== Tab5: 會議紀錄組件 =====
        const Tab5_Meetings = ({ project, updateProject }) => {
            // 圖片預覽狀態
            const [picPreview, setPicPreview] = useState("");

            // --- 圖片縮放、全螢幕拖曳控制狀態 ---
            const [imgScale, setImgScale] = useState(1);
            const [offset, setOffset] = useState({ x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

            const handleWheelZoom = (e) => {
                e.preventDefault();
                if (e.deltaY < 0) setImgScale(prev => Math.min(prev + 0.1, 8));
                else setImgScale(prev => Math.max(prev - 0.1, 0.2));
            };

            const handleMouseDown = (e) => {
                e.preventDefault();
                setIsDragging(true);
                setDragStart({ x: e.clientX - offset.x, y: e.clientY - offset.y });
            };

            const handleMouseMove = (e) => {
                if (!isDragging) return;
                setOffset({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y });
            };

            const handleMouseUp = () => setIsDragging(false);

            const resetImgTransform = () => {
                setImgScale(1);
                setOffset({ x: 0, y: 0 });
                setIsDragging(false);
            };
            // ----------------------------------------
            const [selectedImg, setSelectedImg] = useState(null);
            
            const [isOpen, setIsOpen] = useState(false);
            const [edit, setEdit] = useState(null);

            // 當編輯狀態改變時，載入已存在的圖片
            useEffect(() => {
                if (edit) {
                    setPicPreview(edit.pic || "");
                } else {
                    setPicPreview("");
                }
            }, [edit]);

            // 儲存會議紀錄
            const save = async (e) => {
                e.preventDefault();
                const f = new FormData(e.target);
                
                // 處理圖片上傳
                const file = f.get("meetingPic");
                let picData = edit ? edit.pic : "";
                if (file && file.size > 0) {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    await new Promise((resolve) => {
                        reader.onload = () => {
                            picData = reader.result;
                            resolve();
                        };
                    });
                }

                const item = {
                    id: edit ? edit.id : generateId(),
                    date: f.get("date"),
                    type: f.get("type"),
                    subject: f.get("subject"),
                    attendees: f.get("attendees"),
                    relatedPartNo: f.get("relatedPartNo"),
                    content: f.get("content"),
                    actionItems: f.get("actionItems"),
                    pic: picData // 儲存 Base64 圖片資料
                };

                if (edit) {
                    updateProject(p => ({ ...p, meetings: (p.meetings || []).map(m => m.id === item.id ? item : m) }));
                } else {
                    updateProject(p => ({ ...p, meetings: [...(p.meetings || []), item] }));
                }
                setIsOpen(false);
                setEdit(null);
                setPicPreview("");
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div className="p-4 bg-gray-50 border-b flex justify-between items-center">
                        <h3 className="font-bold text-gray-700"><i className="fas fa-comments mr-2"></i>5. 會議紀錄管理</h3>
                        <button onClick={() => { setEdit(null); setIsOpen(true); }} className="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-md text-sm">
                            <i className="fas fa-plus mr-1"></i> 新增紀錄
                        </button>
                    </div>
                    <div className="divide-y divide-gray-100">
                        {(project.meetings || []).map(m => (
                            <div key={m.id} className="p-6 hover:bg-gray-50 transition">
                                <div className="flex justify-between items-start mb-3">
                                    <div>
                                        <span className="bg-indigo-100 text-indigo-700 text-xs px-2 py-1 rounded mr-2 font-bold">{m.type}</span>
                                        <span className="text-gray-500 text-sm">{m.date}</span>
                                        <h4 className="text-lg font-bold text-gray-800 mt-1">{m.subject}</h4>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => { setEdit(m); setIsOpen(true); }} className="p-2 text-blue-600 hover:bg-blue-50 rounded"><i className="fas fa-edit"></i></button>
                                        <button onClick={() => updateProject(p => ({ ...p, meetings: p.meetings.filter(x => x.id !== m.id) }))} className="p-2 text-red-500 hover:bg-red-50 rounded"><i className="fas fa-trash-alt"></i></button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                                    <div className="bg-gray-50 p-3 rounded">
                                        <div className="text-gray-500 mb-1"><i className="fas fa-users mr-1"></i> 出席人員</div>
                                        <div className="text-gray-700">{m.attendees}</div>
                                        <div className="text-gray-500 mt-2 mb-1"><i className="fas fa-link mr-1"></i> 關聯部品</div>
                                        <div className="text-blue-600 font-medium">{m.relatedPartNo || "無"}</div>
                                    </div>
                                    <div className="bg-amber-50 p-3 rounded border-l-4 border-amber-400">
                                        <div className="text-amber-700 font-bold mb-1"><i className="fas fa-exclamation-circle mr-1"></i> 待辦/結論 (Action Items)</div>
                                        <div className="text-gray-700 whitespace-pre-line">{m.actionItems}</div>
                                    </div>
                                </div>
                                <div className="mt-4 text-gray-600 text-sm border-t pt-3">
                                    <div className="font-bold mb-1 underline">會議內容摘要：</div>
                                    <div className="whitespace-pre-line leading-relaxed">{m.content}</div>
                                </div>

                                {/* 顯示會議照片 */}
                                {m.pic && (
                                    <div className="mt-3">
                                        <img src={m.pic} alt="會議照片" 
                                            onClick={() => setSelectedImg(m.pic)}
                                            className="w-48 h-auto rounded shadow-sm cursor-pointer hover:opacity-90 transition"/>
                                        <p className="text-xs text-gray-400 mt-1 italic">點擊圖片可放大</p>
                                    </div>
                                )}

                                {/* 圖片放大檢視 Modal */}
                                {selectedImg && (
                                    <div 
                                        className="fixed inset-0 bg-black z-[60] flex flex-col justify-center items-center select-none overflow-hidden"
                                        onMouseMove={handleMouseMove}
                                        onMouseUp={handleMouseUp}
                                        onMouseLeave={handleMouseUp}
                                    >
                                        {/* 右上角浮動關閉按鈕 */}
                                        <button 
                                            onClick={() => { setSelectedImg(null); resetImgTransform(); }} 
                                            className="absolute top-4 right-4 bg-gray-800 bg-opacity-60 text-white rounded-full w-12 h-12 flex items-center justify-center hover:bg-red-600 transition-colors z-[70]"
                                        >
                                            <i className="fas fa-times text-2xl"></i>
                                        </button>
                                        
                                        {/* 底部操作提示 */}
                                        <div className="absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-gray-900 bg-opacity-75 text-white px-5 py-2 rounded-full text-sm z-[70] pointer-events-none tracking-wide">
                                            <i className="fas fa-search-plus mr-2"></i>滾輪放大縮小 / <i className="fas fa-arrows-alt mr-2"></i>按住滑鼠左鍵拖曳
                                        </div>

                                        {/* 圖片顯示及拖曳觸發區域 */}
                                        <div 
                                            onWheel={handleWheelZoom} 
                                            onMouseDown={handleMouseDown}
                                            className={`w-full h-full flex justify-center items-center ${isDragging ? 'cursor-grabbing' : 'cursor-grab'}`}
                                        >
                                            <img 
                                                src={selectedImg} 
                                                alt="放大" 
                                                className="max-w-full max-h-full object-contain pointer-events-none" 
                                                style={{ 
                                                    transform: `translate(${offset.x}px, ${offset.y}px) scale(${imgScale})`, 
                                                    transition: isDragging ? 'none' : 'transform 0.1s ease-out', 
                                                    transformOrigin: 'center center' 
                                                }} 
                                            />
                                        </div>
                                    </div>
                                )}
                            </div>
                        ))}
                        {(!project.meetings || project.meetings.length === 0) && <div className="text-center py-12 text-gray-400">目前尚無會議紀錄</div>}
                    </div>

                    {/* 新增/編輯 Modal */}
                    {isOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                            <div className="bg-white rounded-lg p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
                                <h3 className="text-xl font-bold mb-4">{edit ? "編輯" : "新增"}會議紀錄</h3>
                                <form onSubmit={save} className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="block text-sm font-medium">日期</label><input type="date" name="date" defaultValue={edit?.date || new Date().toISOString().split('T')[0]} className="w-full border rounded p-2" required/></div>
                                        <div>
                                            <label className="block text-sm font-medium">類型</label>
                                            <select name="type" defaultValue={edit?.type || "例行週會"} className="w-full border rounded p-2">
                                                <option>例行週會</option><option>試模檢討</option><option>品質異常會</option><option>設計變更會</option><option>其他</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div><label className="block text-sm font-medium">會議主題</label><input name="subject" defaultValue={edit?.subject} className="w-full border rounded p-2" placeholder="例：Model-X 內飾件進度確認" required/></div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="block text-sm font-medium">出席人員</label><input name="attendees" defaultValue={edit?.attendees} className="w-full border rounded p-2" placeholder="多位請用逗號隔開"/></div>
                                        <div>
                                            <label className="block text-sm font-medium">關聯部品</label>
                                            <select name="relatedPartNo" defaultValue={edit?.relatedPartNo} className="w-full border rounded p-2">
                                                <option value="">無關聯</option>
                                                {project.parts.map(p => <option key={p.id} value={p.no}>{p.no} {p.name}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <div><label className="block text-sm font-medium">會議內容摘要</label><textarea name="content" defaultValue={edit?.content} rows="5" className="w-full border rounded p-2" placeholder="請列出會議討論重點..."></textarea></div>
                                    
                                    {/* 圖片上傳預覽區 */}
                                    <div>
                                        <label className="block text-sm font-medium">上傳會議照片 / 紀錄圖</label>
                                        <input type="file" name="meetingPic" accept="image/*" 
                                            onChange={(e) => {
                                                if (e.target.files[0]) {
                                                    const r = new FileReader();
                                                    r.onload = (ev) => setPicPreview(ev.target.result);
                                                    r.readAsDataURL(e.target.files[0]);
                                                }
                                            }}
                                            className="w-full border rounded p-2 text-sm"/>
                                        {picPreview && (
                                            <img src={picPreview} alt="預覽" className="mt-2 w-32 h-20 object-cover rounded border shadow-sm"/>
                                        )}
                                    </div>

                                    <div><label className="block text-sm font-medium text-amber-700 font-bold">待辦事項 (Action Items)</label><textarea name="actionItems" defaultValue={edit?.actionItems} rows="3" className="w-full border border-amber-300 rounded p-2 bg-amber-50" placeholder="誰負責？何時完成？"></textarea></div>
                                    <div className="flex justify-end gap-3 pt-4 border-t">
                                        <button type="button" onClick={() => {setIsOpen(false); setEdit(null);}} className="px-4 py-2 text-gray-600">取消</button>
                                        <button type="submit" className="px-6 py-2 bg-indigo-600 text-white rounded font-bold hover:bg-indigo-700">儲存紀錄</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
                // ===== Tab6: 版次 / 修改履歷 =====
        const Tab6_History = ({ project }) => {
            const [keyword, setKeyword] = useState("");
            const [moduleFilter, setModuleFilter] = useState("all");

            const history = project.history || [];
            const currentVersion = project.version || 1;

            const moduleOptions = [...new Set(history.map(h => h.module).filter(Boolean))];

            const filteredHistory = history.filter(item => {
                if (moduleFilter !== "all" && item.module !== moduleFilter) return false;

                const key = keyword.trim().toLowerCase();
                if (!key) return true;

                const text = [
                    item.time,
                    item.moduleLabel,
                    item.action,
                    item.target,
                    item.fieldLabel,
                    item.oldValue,
                    item.newValue,
                    item.user,
                    item.version
                ].join(" ").toLowerCase();

                return text.includes(key);
            });

            const actionStyle = (action) => {
                switch (action) {
                    case "新增":
                        return "bg-green-100 text-green-700";
                    case "刪除":
                        return "bg-red-100 text-red-700";
                    case "修改":
                        return "bg-blue-100 text-blue-700";
                    default:
                        return "bg-gray-100 text-gray-700";
                }
            };

            const moduleStyle = (module) => {
                switch (module) {
                    case "parts":
                        return "bg-sky-100 text-sky-700";
                    case "docs":
                        return "bg-purple-100 text-purple-700";
                    case "issues":
                        return "bg-red-100 text-red-700";
                    case "tasks":
                        return "bg-amber-100 text-amber-700";
                    case "meetings":
                        return "bg-indigo-100 text-indigo-700";
                    default:
                        return "bg-gray-100 text-gray-700";
                }
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div className="p-4 bg-gray-50 border-b flex justify-between items-center">
                        <div>
                            <h3 className="font-bold text-gray-700 flex items-center gap-2">
                                <i className="fas fa-clock-rotate-left text-indigo-500"></i>
                                6. 版次 / 修改履歷
                            </h3>
                            <div className="text-xs text-gray-500 mt-1">
                                目前版次：v{currentVersion}，共 {history.length} 筆修改紀錄
                            </div>
                        </div>

                        <div className="text-right text-xs text-gray-500">
                            最新修改：
                            <div className="font-bold text-gray-700">
                                {history[0]?.time || "尚無修改紀錄"}
                            </div>
                        </div>
                    </div>

                    <div className="p-4 border-b bg-white pdf-hide">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div className="md:col-span-2">
                                <label className="block text-xs font-bold text-slate-500 mb-1">
                                    關鍵字搜尋
                                </label>
                                <input
                                    value={keyword}
                                    onChange={e => setKeyword(e.target.value)}
                                    className="w-full border rounded-lg px-3 py-2 text-sm"
                                    placeholder="搜尋件號、欄位、修改前後內容、時間、使用者..."
                                />
                            </div>

                            <div>
                                <label className="block text-xs font-bold text-slate-500 mb-1">
                                    模組篩選
                                </label>
                                <select
                                    value={moduleFilter}
                                    onChange={e => setModuleFilter(e.target.value)}
                                    className="w-full border rounded-lg px-3 py-2 text-sm"
                                >
                                    <option value="all">全部模組</option>
                                    {moduleOptions.map(module => (
                                        <option key={module} value={module}>
                                            {HISTORY_MODULE_LABELS[module] || module}
                                        </option>
                                    ))}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div className="divide-y divide-gray-100">
                        {filteredHistory.length === 0 ? (
                            <div className="text-center py-12 text-gray-400">
                                尚無符合條件的修改履歷
                            </div>
                        ) : (
                            filteredHistory.map(item => (
                                <div key={item.id} className="p-5 hover:bg-gray-50">
                                    <div className="flex justify-between items-start gap-4">
                                        <div className="flex-1">
                                            <div className="flex flex-wrap items-center gap-2 mb-2">
                                                <span className="text-xs bg-slate-800 text-white px-2 py-1 rounded-full">
                                                    v{item.version || "-"}
                                                </span>
                                                <span className={`text-xs px-2 py-1 rounded-full font-bold ${moduleStyle(item.module)}`}>
                                                    {item.moduleLabel}
                                                </span>
                                                <span className={`text-xs px-2 py-1 rounded-full font-bold ${actionStyle(item.action)}`}>
                                                    {item.action}
                                                </span>
                                                <span className="text-xs text-gray-500">
                                                    {item.time}
                                                </span>
                                            </div>

                                            <div className="font-bold text-gray-800 mb-1">
                                                {item.target}
                                            </div>

                                            {item.fieldLabel && (
                                                <div className="text-sm text-gray-600 mb-2">
                                                    欄位：
                                                    <span className="font-bold text-blue-700">
                                                        {item.fieldLabel}
                                                    </span>
                                                </div>
                                            )}

                                            {item.action === "修改" ? (
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm">
                                                    <div className="bg-red-50 border border-red-100 rounded-lg p-3">
                                                        <div className="text-xs text-red-500 font-bold mb-1">
                                                            修改前
                                                        </div>
                                                        <div className="text-gray-700 whitespace-pre-line break-words">
                                                            {item.oldValue}
                                                        </div>
                                                    </div>

                                                    <div className="bg-green-50 border border-green-100 rounded-lg p-3">
                                                        <div className="text-xs text-green-600 font-bold mb-1">
                                                            修改後
                                                        </div>
                                                        <div className="text-gray-700 whitespace-pre-line break-words">
                                                            {item.newValue}
                                                        </div>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="text-sm text-gray-600 bg-gray-50 rounded-lg p-3">
                                                    {item.action === "新增" ? item.newValue : item.oldValue}
                                                </div>
                                            )}
                                        </div>

                                        <div className="text-right text-xs text-gray-400 min-w-[90px]">
                                            修改者
                                            <div className="font-bold text-gray-600 mt-1">
                                                {item.user || "目前使用者"}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        };
        // ===== Dashboard 儀表板組件 =====
        const Dashboard = ({ projects, setCurrentId, setActiveView, setActiveTab }) => {

        return (
        <div className="space-y-6">
            <h1 className="text-2xl font-bold mb-4">
                📊 專案總覽 Dashboard
            </h1>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                {/* 遍歷所有專案並顯示卡片 */}
                {Object.entries(projects).map(([id, p]) => {
                    const prog = calcProjectProgress(p); // 計算進度

                    // TAB1 計算詳細分類
                    const totalParts = p.parts.length;
                    const submitted = p.parts.filter(part => part.date).length;
                    const pendingSubmit = totalParts - submitted; // 待送檢
                    const qualified = p.parts.filter(part => part.result === "合格").length; // 合格
                    const ng = p.parts.filter(part => part.result === "NG").length; // NG
                    const measured = qualified + ng;
                    const pendingVerify = submitted - measured; // 待驗

                    const psPercent = (pendingSubmit / totalParts) * 100 || 0;
                    const qPercent = (qualified / totalParts) * 100 || 0;
                    const ngPercent = (ng / totalParts) * 100 || 0;
                    const pvPercent = (pendingVerify / totalParts) * 100 || 0;

                    let start1 = 0;
                    const pie1 = `conic-gradient(
                        #e5e7eb ${start1}% ${start1 += psPercent}%,
                        #22c55e ${start1}% ${start1 += qPercent}%,
                        #ef4444 ${start1}% ${start1 += ngPercent}%,
                        #3b82f6 ${start1}% 100%
                    )`;

                    // TAB2 計算詳細分類
                    const docKeys = ["drawing", "bubble", "eval", "cp", "sip", "sop"];
                    let docDone = 0;
                    let docTotal = 0;
                    p.parts.forEach(part => {
                        const d = p.docs[part.id] || {};
                        docKeys.forEach(k => {
                            docTotal++;
                            if (d[k] === 2) docDone++;
                        });
                    });
                    const donePercent2 = (docDone / docTotal) * 100 || 0;
                    const undonePercent2 = 100 - donePercent2;
                    const pie2 = `conic-gradient(
                        #22c55e 0% ${donePercent2}%,
                        #e5e7eb ${donePercent2}% 100%
                    )`;

                    // TAB3 計算詳細分類
                    const issues = p.issues || [];
                    const solved = issues.filter(i => i.result === "有效").length;
                    const solvedPercent3 = (solved / issues.length) * 100 || 0;
                    const unsolvedPercent3 = 100 - solvedPercent3;
                    const pie3 = `conic-gradient(
                        #22c55e 0% ${solvedPercent3}%,
                        #e5e7eb ${solvedPercent3}% 100%
                    )`;

                    return (
                        <div
                            key={id}
                            onClick={() => {
                                // 點擊卡片跳轉至該專案
                                setCurrentId(id);
                                setActiveView("project");
                                setActiveTab("tab1");
                            }}
                            className="bg-white rounded-xl p-6 shadow border cursor-pointer hover:ring-2 hover:ring-blue-400"
                        >
                            <div className="font-bold text-lg mb-3">
                                {p.info.model}
                            </div>

                            

                            {/*顯示各項進度數值+ 圓餅圖視覺化 */}
                            <div className="mt-4 space-y-2">
                                <div className="flex items-center gap-2">
                                    <div>🔹 部品送樣（TAB1）：{prog.tab1}%</div>
                                    <div style={{ width: '40px', height: '40px', borderRadius: '50%', background: pie1 }}></div>
                                    
                                </div>
                                <div className="flex items-center gap-2">
                                    <div>🔹 PPAP 文件（TAB2）：{prog.tab2}%</div>
                                    <div style={{ width: '40px', height: '40px', borderRadius: '50%', background: pie2 }}></div>
                                    
                                </div>
                                <div className="flex items-center gap-2">
                                    <div>🔹 問題點對應（TAB3）：{prog.tab3}%</div>
                                    <div style={{ width: '40px', height: '40px', borderRadius: '50%', background: pie3 }}></div>
                                    
                                </div>
                            </div>
                        </div>
                    );
                })}
            </div>
        </div>
    );
};
        

        // ===== 主應用程式組件 (App) =====
        const App = () => {
            // 控制是否顯示備份提醒
            const [showBackupReminder, setShowBackupReminder] = useState(false);

            // 專案資料 State
            const [projects, setProjects] = useState(demoProjects);
            // 當前選中的專案 ID
            const [currentId, setCurrentId] = useState(null);
            // 當前選中的分頁 (Tab)
            const [activeTab, setActiveTab] = useState("tab1");
            // 當前視圖 (Project Detail 或 Dashboard)
            const [activeView, setActiveView] = useState("project"); 
            // 側邊欄縮放狀態
            const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

                        // 分組狀態：控制 ProjectHeader、Tab1、Tab2、Tab3、Tab5 顯示的資料範圍
            const [groupBy, setGroupBy] = useState("all");
            const [selectedGroup, setSelectedGroup] = useState("all");

            // 搜尋與篩選狀態：套用在分組後資料
            const [partFilters, setPartFilters] = useState(createDefaultPartFilters());
            // 初始化：從 IndexedDB 讀取資料
            useEffect(() => {
                (async () => {
                    const saved = await idbGet("qa-projects");
                    if (saved) setProjects(saved);
                })();
            }, []);

            // 監聽 projects 變化：自動存入 IndexedDB 與 LocalStorage 紀錄
            useEffect(() => {
                // v1 相容模式存檔
                idbSet("qa-projects", projects);

                // v2 架構：也可將專案拆開儲存 (備用)
                Object.entries(projects).forEach(([id, project]) => {
                    idbSet(`project:${id}`, project);
                });

                // 更新最後修改時間
                idbSet("qa-last-modified", Date.now());
                localStorage.setItem("qa-last-modified", Date.now());
            }, [projects]);

            // 當沒有選中專案且有專案存在時，預設選取第一個
            useEffect(() => {
                if (!currentId && Object.keys(projects).length > 0) {
                    setCurrentId(Object.keys(projects)[0]);
                }
            }, [projects]);

                                   // 切換專案時，避免沿用上一個專案的分組與篩選條件
            useEffect(() => {
                setGroupBy("all");
                setSelectedGroup("all");
                setPartFilters(createDefaultPartFilters());
            }, [currentId]);

            // 檢查是否需要備份 (修改時間 > 備份時間)
            useEffect(() => {
                (async () => {
                    const lastModified = (await idbGet("qa-last-modified")) || 0;
                    const lastBackup = (await idbGet("qa-last-backup")) || 0;

                    if (lastModified > lastBackup) {
                        setShowBackupReminder(true);
                    }
                })();
            }, []);
            
            // 視窗關閉前警告 (若未備份)
            useEffect(() => {
                const handler = (e) => {
                    const lastModified = Number(localStorage.getItem("qa-last-modified") || 0);
                    const lastBackup = Number(localStorage.getItem("qa-last-backup") || 0);
                    if (lastModified > lastBackup) {
                        e.preventDefault();
                        e.returnValue = "離開前是否已匯出備份？";
                    }
                };
                window.addEventListener("beforeunload", handler);
                return () => window.removeEventListener("beforeunload", handler);
            }, []);

                                    // 取得當前專案資料物件
                        const current = projects[currentId] || { info: {}, parts: [], docs: {}, issues: [], tasks: [], meetings: [], overdueDeferrals: {}, version: 1, history: [] };

            // 先依照目前分組條件產生資料，再套用搜尋與篩選
            const groupedCurrent = buildGroupedProject(current, groupBy, selectedGroup);
            const visibleCurrent = buildFilteredProject(groupedCurrent, partFilters);

            // 更新當前專案的輔助函式

                        // 更新當前專案的輔助函式：自動產生版次與修改履歷
            const updateCurrent = (fn) => {
                setProjects(prevProjects => {
                    const prevProject = prevProjects[currentId];

                    if (!prevProject) return prevProjects;

                    const nextProjectRaw = fn(prevProject);

                    if (!nextProjectRaw) return prevProjects;

                    // 比對更新前後差異
                    const historyRecords = buildProjectHistoryRecords(prevProject, nextProjectRaw);

                    // 沒有實際差異時，不新增履歷
                    if (historyRecords.length === 0) {
                        return {
                            ...prevProjects,
                            [currentId]: nextProjectRaw
                        };
                    }

                    const nextVersion = (prevProject.version || 1) + 1;

                    const versionedHistoryRecords = historyRecords.map(record => ({
                        ...record,
                        version: nextVersion
                    }));

                    const nextProject = {
                        ...nextProjectRaw,
                        version: nextVersion,
                        history: [
                            ...versionedHistoryRecords,
                            ...(prevProject.history || [])
                        ].slice(0, HISTORY_OPTIONS.maxRecords)
                    };

                    return {
                        ...prevProjects,
                        [currentId]: nextProject
                    };
                });
            };

            // 載入中狀態處理

            if (activeView === "project" && !currentId) {
                return (
                    <div className="flex items-center justify-center h-screen text-xl text-gray-500">
                        載入中…
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* 左側選單 */}
                                        <Sidebar
                        currentProjectId={currentId}
                        setCurrentProjectId={setCurrentId}
                        projects={projects}
                        setProjects={setProjects}
                        setCurrentId={setCurrentId}
                        collapsed={sidebarCollapsed}
                        setCollapsed={setSidebarCollapsed}
                        setActiveView={setActiveView}
                        setActiveTab={setActiveTab}
                    />
                    
                    {/* 右側主內容區 */}
                    <div className={`flex-1 ${sidebarCollapsed ? "ml-20" : "ml-72"} p-8 overflow-y-auto pdf-export-area transition-all duration-300`}>
                        
                        {/* ===== PDF 匯出專用隱藏區 (完整渲染所有 Tabs 生成報告) ===== */}
<div className="pdf-export-hidden pdf-export-area">
    {/* 0. 專案封面/標頭 */}
    <div className="mb-8 text-center border-b-2 border-gray-800 pb-4">
        <h1 className="text-4xl font-bold mb-2">QA 專案管理報告</h1>
        <p className="text-gray-500">匯出日期：{new Date().toLocaleDateString()}</p>
    </div>
            <ProjectHeader
        project={visibleCurrent}
        sourceProject={current}
        groupBy={groupBy}
        selectedGroup={selectedGroup}
    />

    <ProjectAlertPanel project={visibleCurrent} updateProject={updateCurrent} />

    {/* 1. 部品送樣清單 */}
    <div className="pdf-section-title">1. 部品送樣清單</div>
    {/* 注意：這裡傳入 dummy updateProject 避免在 PDF 預覽區誤觸發更新 */}
        <Tab1_Submission project={visibleCurrent} updateProject={() => {}} />

    
    <div className="pdf-page-break"></div>

    {/* 2. PPAP 文件狀況 */}
    <div className="pdf-section-title">2. PPAP 文件矩陣</div>
        <Tab2_Docs project={visibleCurrent} updateProject={() => {}} />

    <div className="pdf-page-break"></div>

    {/* 3. 問題點追蹤 */}
    <div className="pdf-section-title">3. 問題點追蹤表</div>
        <Tab3_Issues project={visibleCurrent} updateProject={() => {}} />

    <div className="pdf-page-break"></div>

    {/* 4. 會議紀錄 (選擇性匯出) */}
    <div className="pdf-section-title">4. 會議紀錄摘要</div>
        <Tab5_Meetings project={visibleCurrent} updateProject={() => {}} />
    
    {/* 頁尾聲明 */}
    <div className="mt-10 text-center text-xs text-gray-400 border-t pt-4">
            <div className="pdf-page-break"></div>

    <div className="pdf-section-title">5. 修改履歷摘要</div>
    <Tab6_History project={current} />
        本報表由 QA PMS 系統自動產生
    </div>

</div>

                        {/* 根據視圖模式顯示內容 */}
                        {activeView === "dashboard" ? (
                            <Dashboard 
                                projects={projects} 
                                setCurrentId={setCurrentId} 
                                setActiveView={setActiveView} 
                                setActiveTab={setActiveTab} />
                        ) : (
                            <>
                                                                                               <ProjectHeader
                                    project={visibleCurrent}
                                    sourceProject={current}
                                    groupBy={groupBy}
                                    selectedGroup={selectedGroup}
                                    setGroupBy={setGroupBy}
                                    setSelectedGroup={setSelectedGroup}
                                />

                                <PartSearchFilterPanel
                                    project={visibleCurrent}
                                    sourceProject={groupedCurrent}
                                    filters={partFilters}
                                    setFilters={setPartFilters}
                                />

                                <ProjectAlertPanel project={visibleCurrent} updateProject={updateCurrent} />

                                {/* Tab 切換按鈕 */}
                                <div className="mb-6">
                                    <div className="flex gap-4 border-b">
                                                                                {[
                                            { id: "tab1", icon: "fa-box-open", label: "1. 部品送樣" },
                                            { id: "tab2", icon: "fa-file-contract", label: "2. PPAP 文件" },
                                            { id: "tab3", icon: "fa-bug", label: "3. 問題點追蹤" },
                                            { id: "tab4", icon: "fa-list-check", label: "4. 其他任務" },
                                            { id: "tab5", icon: "fa-comments", label: "5. 會議紀錄" },
                                            { id: "tab6", icon: "fa-clock-rotate-left", label: "6. 修改履歷" },
                                        ].map(t => (
                                            <button
                                                key={t.id}
                                                onClick={() => setActiveTab(t.id)}
                                                className={`px-6 py-3 font-medium transition ${activeTab === t.id ? "text-blue-600 border-b-4 border-blue-600" : "text-gray-600 hover:text-gray-900"}`}
                                            >
                                                <i className={`fas ${t.icon} mr-2`}></i>{t.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                                                                                {/* 根據 Tab 顯示對應組件 */}
                                {activeTab === "tab1" && <Tab1_Submission project={visibleCurrent} updateProject={updateCurrent} />}
                                {activeTab === "tab2" && <Tab2_Docs project={visibleCurrent} updateProject={updateCurrent} />}
                                {activeTab === "tab3" && <Tab3_Issues project={visibleCurrent} updateProject={updateCurrent} />}
                                {activeTab === "tab4" && <Tab4_Tasks project={current} updateProject={updateCurrent} />}
                                {activeTab === "tab5" && <Tab5_Meetings project={visibleCurrent} updateProject={updateCurrent} />}
                                {activeTab === "tab6" && <Tab6_History project={current} />}

                            </>
                        )}
                    </div>

                    {/* 備份提醒 Modal */}
                    {showBackupReminder && (
                        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
                            <div className="bg-white rounded-xl p-6 w-[360px] shadow-lg">
                                <h3 className="text-lg font-semibold mb-2">
                                    尚未備份資料
                                </h3>
                                <p className="text-sm text-gray-600 mb-4">
                                    偵測到資料在上次備份後有異動，建議立即匯出 JSON 備份。
                                </p>
                                <div className="flex justify-end gap-3">
                                    <button
                                        onClick={() => setShowBackupReminder(false)}
                                        className="px-4 py-2 text-gray-600 hover:text-gray-800"
                                    >
                                        稍後再說
                                    </button>
                                    <button
                                        onClick={() => {
                                            exportJSONBackup(projects);
                                            setShowBackupReminder(false);
                                        }}
                                        className="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
                                    >
                                        立即備份
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        // React 啟動點
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
